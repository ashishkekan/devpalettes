[build]
  publish = "."

# ✅ Allow sitemap FIRST
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# ✅ Allow robots
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# ✅ Force HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# ✅ Clean URLs
[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
