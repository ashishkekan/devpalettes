<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Preview how your color palette looks on real UI components. Test contrast, buttons, cards, and charts.">
  <meta name="keywords" content="color usage, ui color tester, theme previewer, css variables">
  <meta name="author" content="Devpalettes">
  
  <title>Color Usage Preview Tool | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="../../assets/js/theme-preload.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <!-- Header -->
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-eye mr-2"></i>UI Preview
        </span>
        <h1 class="text-4xl font-bold mb-4">Color Usage Preview</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">
          See your colors in action on real UI components. Test contrast and accessibility.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-4 gap-8">
        
        <!-- Left: Controls -->
        <div class="lg:col-span-1 space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card sticky top-24">
             <h3 class="font-bold mb-4 text-lg">Palette Input</h3>
             
             <div class="space-y-3">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Primary</label>
                   <div class="flex gap-2">
                      <input type="color" id="c-primary" value="#4f46e5" class="w-12 h-10 rounded cursor-pointer bg-transparent">
                      <input type="text" id="t-primary" value="#4f46e5" class="flex-1 bg-slate-100 dark:bg-slate-800 rounded px-2 text-xs font-mono" onchange="syncText('primary')">
                   </div>
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Secondary</label>
                   <div class="flex gap-2">
                      <input type="color" id="c-secondary" value="#06b6d4" class="w-12 h-10 rounded cursor-pointer bg-transparent">
                      <input type="text" id="t-secondary" value="#06b6d4" class="flex-1 bg-slate-100 dark:bg-slate-800 rounded px-2 text-xs font-mono" onchange="syncText('secondary')">
                   </div>
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Accent</label>
                   <div class="flex gap-2">
                      <input type="color" id="c-accent" value="#22c55e" class="w-12 h-10 rounded cursor-pointer bg-transparent">
                      <input type="text" id="t-accent" value="#22c55e" class="flex-1 bg-slate-100 dark:bg-slate-800 rounded px-2 text-xs font-mono" onchange="syncText('accent')">
                   </div>
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Background</label>
                   <div class="flex gap-2">
                      <input type="color" id="c-bg" value="#ffffff" class="w-12 h-10 rounded cursor-pointer bg-transparent">
                      <input type="text" id="t-bg" value="#ffffff" class="flex-1 bg-slate-100 dark:bg-slate-800 rounded px-2 text-xs font-mono" onchange="syncText('bg')">
                   </div>
                </div>
             </div>
             
             <div class="mt-4 space-y-2">
                <button onclick="applyColors()" class="btn-primary w-full justify-center py-2 text-sm"><i class="fas fa-check mr-1"></i>Apply</button>
                <button onclick="randomize()" class="btn-secondary w-full justify-center py-2 text-sm"><i class="fas fa-random mr-1"></i>Randomize</button>
             </div>
          </div>
        </div>
        
        <!-- Right: Preview Area -->
        <div class="lg:col-span-3 space-y-6 animate-on-scroll">
          
          <!-- Live Preview Container -->
          <div id="preview-container" class="glass-card p-0 overflow-hidden min-h-[600px] transition-colors duration-500" style="background-color: #ffffff;">
             
             <!-- Navbar Preview -->
             <div id="prev-navbar" class="p-4 flex justify-between items-center transition-colors duration-500" style="background-color: #4f46e5;">
                <span class="font-bold text-white">MyApp</span>
                <div class="flex gap-4 text-sm text-white/80">
                   <span>Home</span>
                   <span>About</span>
                   <span>Contact</span>
                </div>
             </div>
             
             <!-- Content -->
             <div class="p-8 space-y-8">
                <!-- Cards Grid -->
                <div class="grid md:grid-cols-3 gap-6">
                   <div class="p-4 rounded-xl shadow-lg transition-colors duration-500" style="background-color: #f8fafc;">
                      <div class="w-full h-20 rounded-lg mb-3 transition-colors duration-500" style="background-color: #e2e8f0;"></div>
                      <h3 class="font-bold text-slate-800 mb-1">Card Title</h3>
                      <p class="text-xs text-slate-500">Card subtitle text</p>
                   </div>
                   <div class="p-4 rounded-xl shadow-lg transition-colors duration-500" style="background-color: #f8fafc;">
                      <div class="w-full h-20 rounded-lg mb-3 transition-colors duration-500" style="background-color: #e2e8f0;"></div>
                      <h3 class="font-bold text-slate-800 mb-1">Analytics</h3>
                      <p class="text-xs text-slate-500">Data overview</p>
                   </div>
                   <div class="p-4 rounded-xl shadow-lg transition-colors duration-500" style="background-color: #f8fafc;">
                      <div class="w-full h-20 rounded-lg mb-3 transition-colors duration-500" style="background-color: #e2e8f0;"></div>
                      <h3 class="font-bold text-slate-800 mb-1">Settings</h3>
                      <p class="text-xs text-slate-500">User config</p>
                   </div>
                </div>
                
                <!-- Buttons & Alerts -->
                <div class="flex flex-wrap gap-4 items-center">
                   <button id="btn-pri" class="px-4 py-2 rounded-lg text-white text-sm font-medium transition-colors duration-500" style="background-color: #4f46e5;">Primary</button>
                   <button id="btn-sec" class="px-4 py-2 rounded-lg text-white text-sm font-medium transition-colors duration-500" style="background-color: #06b6d4;">Secondary</button>
                   <button id="btn-acc" class="px-4 py-2 rounded-lg text-white text-sm font-medium transition-colors duration-500" style="background-color: #22c55e;">Accent</button>
                   
                   <div id="alert-prev" class="ml-auto px-4 py-2 rounded-lg text-white text-xs transition-colors duration-500" style="background-color: #4f46e5;">
                      <i class="fas fa-info-circle mr-1"></i> Alert Message
                   </div>
                </div>
                
                <!-- Chart -->
                <div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800/50">
                   <h4 class="font-bold mb-4 text-slate-700">Chart Preview</h4>
                   <canvas id="chart-canvas" width="400" height="150"></canvas>
                </div>
             </div>
          </div>
          
          <!-- Code Output -->
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">Generated CSS Variables</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
          
        </div>
        
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const inputs = {
       pri: { c: document.getElementById('c-primary'), t: document.getElementById('t-primary') },
       sec: { c: document.getElementById('c-secondary'), t: document.getElementById('t-secondary') },
       acc: { c: document.getElementById('c-accent'), t: document.getElementById('t-accent') },
       bg: { c: document.getElementById('c-bg'), t: document.getElementById('t-bg') }
    };
    
    // Sync color to text
    Object.keys(inputs).forEach(k => {
       inputs[k].c.addEventListener('input', () => {
          inputs[k].t.value = inputs[k].c.value;
       });
    });
    
    window.syncText = function(type) {
       inputs[type].c.value = inputs[type].t.value;
    };
    
    window.applyColors = function() {
       const pri = inputs.pri.c.value;
       const sec = inputs.sec.c.value;
       const acc = inputs.acc.c.value;
       const bg = inputs.bg.c.value;
       
       // Apply to Preview Container
       const container = document.getElementById('preview-container');
       container.style.backgroundColor = bg;
       
       document.getElementById('prev-navbar').style.backgroundColor = pri;
       document.getElementById('btn-pri').style.backgroundColor = pri;
       document.getElementById('alert-prev').style.backgroundColor = pri;
       
       document.getElementById('btn-sec').style.backgroundColor = sec;
       document.getElementById('btn-acc').style.backgroundColor = acc;
       
       drawChart(pri, sec, acc);
       generateCode(pri, sec, acc, bg);
    };
    
    window.randomize = function() {
       const rand = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
       inputs.pri.c.value = rand();
       inputs.sec.c.value = rand();
       inputs.acc.c.value = rand();
       inputs.bg.c.value = rand(); // Keep bg light or dark for demo
       
       Object.keys(inputs).forEach(k => inputs[k].t.value = inputs[k].c.value);
       applyColors();
    };
    
    function drawChart(c1, c2, c3) {
       const canvas = document.getElementById('chart-canvas');
       const ctx = canvas.getContext('2d');
       ctx.clearRect(0, 0, 400, 150);
       
       const data = [80, 120, 60, 90, 150];
       const colors = [c1, c2, c3, c1, c2];
       const xStep = 70;
       
       data.forEach((h, i) => {
          ctx.fillStyle = colors[i];
          ctx.fillRect(20 + (i * xStep), 150 - h, 40, h);
       });
    }
    
    function generateCode(p, s, a, b) {
       const css = `:root {
  --primary: ${p};
  --secondary: ${s};
  --accent: ${a};
  --background: ${b};
}`;
       document.getElementById('code-output').textContent = css;
    }
    
    window.copyCode = function() {
       const text = document.getElementById('code-output').textContent;
       Clipboard.writeText(text);
       if(window.Devpalettes && window.Devpalettes.Toast) {
          window.Devpalettes.Toast.show('CSS Variables Copied!', 'success');
       }
    };
    
    // Init
    applyColors();
  </script>
</body>
</html>
