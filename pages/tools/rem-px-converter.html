<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert PX to REM and vice versa. Calculate root font size for responsive design.">
  <meta name="keywords" content="px to rem converter, rem calculator, css units, responsive typography">
  <meta name="author" content="Devpalettes">
  
  <title>REM / PX Converter | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/theme-preload.js"></script>
  <script> tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } } </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-teal-100 dark:bg-teal-900/30 text-teal-600 dark:text-teal-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-ruler-horizontal mr-2"></i>Dev Tool
        </span>
        <h1 class="text-4xl font-bold mb-4">REM / PX Converter</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">Convert between pixels and REM units.</p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="glass-card p-6 shimmer-card mb-6 animate-on-scroll">
         <div class="flex justify-center items-center gap-4 mb-6">
            <span class="text-xs font-bold text-slate-500">Base Size: <span id="base-val">16</span>px</span>
            <input type="range" id="base-size" min="10" max="24" value="16" onchange="recalc()" class="w-32 accent-emerald-500">
         </div>
         
         <div class="grid md:grid-cols-2 gap-8">
            <!-- PX Input -->
            <div>
               <label class="block text-xs font-semibold text-slate-500 mb-2">Pixels (px)</label>
               <input type="number" id="px-in" value="16" oninput="convert('px')" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-4 py-3 text-lg font-bold text-center focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            
            <!-- REM Input -->
            <div>
               <label class="block text-xs font-semibold text-slate-500 mb-2">Root EM (rem)</label>
               <input type="number" step="0.001" id="rem-in" value="1" oninput="convert('rem')" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-4 py-3 text-lg font-bold text-center focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
         </div>
      </div>
      
      <!-- Quick Reference Table -->
      <div class="glass-card p-6 shimmer-card animate-on-scroll">
         <h3 class="font-bold mb-4 text-lg">Quick Reference</h3>
         <div id="ref-table" class="grid grid-cols-4 gap-2 text-center text-xs font-mono">
            <!-- Generated by JS -->
         </div>
      </div>
      
    </div>
  </main>
  
  <div id="footer-container"></div>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const pxInput = document.getElementById('px-in');
    const remInput = document.getElementById('rem-in');
    const baseInput = document.getElementById('base-size');
    const baseVal = document.getElementById('base-val');
    const refTable = document.getElementById('ref-table');
    
    window.convert = function(type) {
       const base = parseFloat(baseInput.value);
       if(type === 'px') {
          const px = parseFloat(pxInput.value);
          if(!isNaN(px)) remInput.value = (px / base).toFixed(3);
       } else {
          const rem = parseFloat(remInput.value);
          if(!isNaN(rem)) pxInput.value = (rem * base).toFixed(2);
       }
    };
    
    window.recalc = function() {
       baseVal.textContent = baseInput.value;
       convert('px');
       generateTable();
    };
    
    function generateTable() {
       const base = parseFloat(baseInput.value);
       const refs = [10, 12, 14, 16, 18, 20, 24, 32, 40, 48, 64, 96];
       refTable.innerHTML = '';
       
       refs.forEach(px => {
          const rem = (px / base).toFixed(2);
          refTable.innerHTML += `
             <div class="p-2 bg-slate-100 dark:bg-slate-800 rounded">${px}px</div>
             <div class="p-2 bg-slate-200 dark:bg-slate-700 rounded">${rem}rem</div>
          `;
       });
    }
    
    generateTable();
  </script>
</body>
</html>
