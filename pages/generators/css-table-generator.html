<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate styled HTML Tables. Add stripes, borders, and hover effects.">
  <meta name="keywords" content="css table generator, html table styler, responsive table, styled table">
  <meta name="author" content="Devpalettes">
  
  <title>CSS Table Generator | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
  </script>
  <script> tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } } </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py- bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-table mr-2"></i>UI Component
        </span>
        <h1 class="text-4xl font-bold mb-4">CSS Table Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">Style responsive tables with ease.</p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Settings</h3>
             <div class="space-y-3">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Header BG</label>
                   <input type="color" id="t-head" value="#6366f1" onchange="updateTable()" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Row Color</label>
                   <input type="color" id="t-row" value="#ffffff" onchange="updateTable()" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Border Color</label>
                   <input type="color" id="t-border" value="#e2e8f0" onchange="updateTable()" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
                <div class="flex items-center justify-between mt-2">
                   <span class="text-sm text-slate-600 dark:text-slate-300">Striped Rows</span>
                   <input type="checkbox" id="t-striped" checked onchange="updateTable()" class="accent-indigo-500 w-5 h-5 rounded">
                </div>
                <div class="flex items-center justify-between">
                   <span class="text-sm text-slate-600 dark:text-slate-300">Hover Effect</span>
                   <input type="checkbox" id="t-hover" checked onchange="updateTable()" class="accent-indigo-500 w-5 h-5 rounded">
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          <!-- Preview -->
          <div class="glass-card p-0 shimmer-card overflow-x-auto">
             <table id="table-preview" class="w-full text-sm text-left transition-all duration-300">
                <thead>
                   <tr>
                      <th class="px-4 py-3 text-white">Name</th>
                      <th class="px-4 py-3 text-white">Age</th>
                      <th class="px-4 py-3 text-white">Role</th>
                   </tr>
                </thead>
                <tbody>
                   <tr><td class="px-4 py-3">Alice Johnson</td><td class="px-4 py-3">29</td><td class="px-4 py-3">Designer</td></tr>
                   <tr><td class="px-4 py-3">Bob Smith</td><td class="px-4 py-3">34</td><td class="px-4 py-3">Developer</td></tr>
                   <tr><td class="px-4 py-3">Charlie Brown</td><td class="px-4 py-3">28</td><td class="px-4 py-3">Manager</td></tr>
                </tbody>
             </table>
          </div>
          
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const table = document.getElementById('table-preview');
    const codeOutput = document.getElementById('code-output');
    
    window.updateTable = function() {
       const head = document.getElementById('t-head').value;
       const row = document.getElementById('t-row').value;
       const border = document.getElementById('t-border').value;
       const striped = document.getElementById('t-striped').checked;
       const hover = document.getElementById('t-hover').checked;
       
       // Apply styles
       const ths = table.querySelectorAll('th');
       ths.forEach(th => {
          th.style.backgroundColor = head;
       });
       
       const rows = table.querySelectorAll('tbody tr');
       rows.forEach((r, i) => {
          r.style.backgroundColor = i % 2 === 0 ? row : (striped ? adjustColor(row, -5) : row);
          if(hover) {
             r.onmouseenter = () => r.style.backgroundColor = adjustColor(row, -15);
             r.onmouseleave = () => r.style.backgroundColor = i % 2 === 0 ? row : (striped ? adjustColor(row, -5) : row);
          } else {
             r.onmouseenter = null;
             r.onmouseleave = null;
          }
          
          // Border
          r.querySelectorAll('td').forEach(td => {
             td.style.borderColor = border;
          });
       });
       
       generateCode(head, row, border, striped, hover);
    };
    
    function adjustColor(hex, percent) {
       const num = parseInt(hex.slice(1), 16);
       const amt = Math.round(2.55 * percent);
       const R = Math.min(255, Math.max(0, (num >> 16) + amt));
       const G = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amt));
       const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
       return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
    }
    
    function generateCode(h, r, b, s, hov) {
       const css = `.styled-table {
    border-collapse: collapse;
    margin: 25px 0;
    font-size: 0.9em;
    min-width: 400px;
    border-radius: 5px 5px 0 0;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
}

.styled-table thead tr {
    background-color: ${h};
    color: #ffffff;
    text-align: left;
}

.styled-table th,
.styled-table td {
    padding: 12px 15px;
    border-bottom: 1px solid ${b};
}

.styled-table tbody tr {
    border-bottom: 1px solid ${b};
    background-color: ${r};
}

 ${s ? `.styled-table tbody tr:nth-of-type(even) {
    background-color: ${adjustColor(r, -5)};
}` : ''}

 ${hov ? `.styled-table tbody tr:hover {
    background-color: ${adjustColor(r, -15)};
    cursor: pointer;
}` : ''}`;
       codeOutput.textContent = css;
    }
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       navigator.clipboard.writeText(text);
       if(window.Devpalettes && window.Devpalettes.Toast) window.Devpalettes.Toast.show('Code Copied!', 'success');
    };
    
    updateTable();
  </script>
</body>
</html>
