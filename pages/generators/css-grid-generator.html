<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive CSS Grid Generator. Visualize and generate grid layouts instantly.">
  <meta name="keywords" content="css grid generator, layout tool, css grid layout">
  <meta name="author" content="Devpalettes">
  
  <title>CSS Grid Generator | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="../../assets/js/theme-preload.js"></script>
  <script> tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } } </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-th mr-2"></i>Layout Tool
        </span>
        <h1 class="text-4xl font-bold mb-4">CSS Grid Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">Build complex grid layouts visually.</p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Grid Settings</h3>
             <div class="space-y-4">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Columns: <span id="v-cols">3</span></label>
                   <input type="range" id="ctrl-cols" min="1" max="6" value="3" onchange="updateGrid()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Rows: <span id="v-rows">2</span></label>
                   <input type="range" id="ctrl-rows" min="1" max="6" value="2" onchange="updateGrid()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Gap: <span id="v-gap">10</span>px</label>
                   <input type="range" id="ctrl-gap" min="0" max="50" value="10" onchange="updateGrid()" class="w-full accent-emerald-500">
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card min-h-[300px] flex items-center justify-center">
             <div id="grid-preview" class="w-full h-64 transition-all duration-300 grid gap-2">
                <!-- Grid items injected by JS -->
             </div>
          </div>
          
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const preview = document.getElementById('grid-preview');
    const codeOutput = document.getElementById('code-output');
    
    window.updateGrid = function() {
       const cols = document.getElementById('ctrl-cols').value;
       const rows = document.getElementById('ctrl-rows').value;
       const gap = document.getElementById('ctrl-gap').value;
       
       document.getElementById('v-cols').textContent = cols;
       document.getElementById('v-rows').textContent = rows;
       document.getElementById('v-gap').textContent = gap;
       
       preview.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
       preview.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
       preview.style.gap = `${gap}px`;
       
       // Generate Items
       const total = cols * rows;
       preview.innerHTML = '';
       for(let i=0; i<total; i++) {
          const div = document.createElement('div');
          div.className = 'bg-gradient-to-br from-indigo-400 to-purple-500 rounded-lg flex items-center justify-center text-white font-bold text-xs shadow';
          div.textContent = i+1;
          preview.appendChild(div);
       }
       
       generateCode(cols, rows, gap);
    };
    
    function generateCode(c, r, g) {
       const css = `.grid-container {
  display: grid;
  grid-template-columns: repeat(${c}, 1fr);
  grid-template-rows: repeat(${r}, 1fr);
  gap: ${g}px;
}`;
       codeOutput.textContent = css;
    }
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       Clipboard.writeText(text);
       if(window.Devpalettes && window.Devpalettes.Toast) window.Devpalettes.Toast.show('CSS Copied!', 'success');
    };
    
    updateGrid();
  </script>
</body>
</html>
