<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate CSS triangles and arrows using border tricks.">
  <meta name="keywords" content="css triangle generator, css arrow, tooltip arrow, css shape">
  <meta name="author" content="Devpalettes">
  
  <title>CSS Triangle Generator | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="../../assets/js/theme-preload.js"></script>
  <script> tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } } </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-caret-up mr-2"></i>CSS Trick
        </span>
        <h1 class="text-4xl font-bold mb-4">CSS Triangle Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">Create arrows and tooltips with pure CSS borders.</p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Direction</h3>
             <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="setDir('top')" class="dir-btn active px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Up</button>
                <button onclick="setDir('bottom')" class="dir-btn px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Down</button>
                <button onclick="setDir('left')" class="dir-btn px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Left</button>
                <button onclick="setDir('right')" class="dir-btn px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Right</button>
             </div>
             
             <div class="space-y-4">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Size: <span id="v-size">50</span>px</label>
                   <input type="range" id="t-size" min="10" max="200" value="50" onchange="updateTriangle()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Color</label>
                   <input type="color" id="t-color" value="#10b981" onchange="updateTriangle()" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          
          <div class="glass-card p-8 shimmer-card min-h-[300px] flex items-center justify-center">
             <div id="tri-preview" class="transition-all duration-300"></div>
          </div>
          
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
          
        </div>
        
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const preview = document.getElementById('tri-preview');
    const codeOutput = document.getElementById('code-output');
    
    let dir = 'top';
    
    window.setDir = function(d) {
       dir = d;
       document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active', 'bg-emerald-500', 'text-white'));
       event.target.classList.add('active', 'bg-emerald-500', 'text-white');
       updateTriangle();
    };
    
    window.updateTriangle = function() {
       const size = document.getElementById('t-size').value;
       const color = document.getElementById('t-color').value;
       
       document.getElementById('v-size').textContent = size;
       
       // Reset styles
       preview.style.width = '0';
       preview.style.height = '0';
       preview.style.borderTop = 'none';
       preview.style.borderBottom = 'none';
       preview.style.borderLeft = 'none';
       preview.style.borderRight = 'none';
       
       // Apply Border Trick
       const transparent = 'transparent';
       const borderSize = `${size}px`;
       
       if(dir === 'top') {
          preview.style.borderLeft = `${borderSize} solid ${transparent}`;
          preview.style.borderRight = `${borderSize} solid ${transparent}`;
          preview.style.borderBottom = `${borderSize} solid ${color}`;
       } else if(dir === 'bottom') {
          preview.style.borderLeft = `${borderSize} solid ${transparent}`;
          preview.style.borderRight = `${borderSize} solid ${transparent}`;
          preview.style.borderTop = `${borderSize} solid ${color}`;
       } else if(dir === 'left') {
          preview.style.borderTop = `${borderSize} solid ${transparent}`;
          preview.style.borderBottom = `${borderSize} solid ${transparent}`;
          preview.style.borderRight = `${borderSize} solid ${color}`;
       } else if(dir === 'right') {
          preview.style.borderTop = `${borderSize} solid ${transparent}`;
          preview.style.borderBottom = `${borderSize} solid ${transparent}`;
          preview.style.borderLeft = `${borderSize} solid ${color}`;
       }
       
       generateCode(size, color, dir);
    };
    
    function generateCode(s, c, d) {
       const css = `.triangle {
  width: 0;
  height: 0;
  border: ${s}px solid transparent;
  ${d === 'top' ? `border-bottom: ${s}px solid ${c};` : ''}
  ${d === 'bottom' ? `border-top: ${s}px solid ${c};` : ''}
  ${d === 'left' ? `border-right: ${s}px solid ${c};` : ''}
  ${d === 'right' ? `border-left: ${s}px solid ${c};` : ''}
}`;
       codeOutput.textContent = css;
    }
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       Clipboard.writeText(text);
       if(window.Devpalettes && window.Devpalettes.Toast) window.Devpalettes.Toast.show('Code Copied!', 'success');
    };
    
    updateTriangle();
  </script>
</body>
</html>
