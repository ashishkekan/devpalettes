<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate Tailwind CSS color palettes from a single base color. Get shades 50-900 instantly for your config.">
  <meta name="keywords" content="tailwind color generator, tailwind css palette, tailwind shades, tailwind config">
  <meta name="author" content="Devpalettes">
  
  <title>Tailwind Color Palette Generator | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || 
       (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <!-- Visualizer Background -->
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div class="gradient-blob blob-3"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <!-- Header -->
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-cyan-100 dark:bg-cyan-900/30 text-cyan-600 dark:text-cyan-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-wind mr-2"></i>Framework Tool
        </span>
        <h1 class="text-4xl font-bold mb-4">Tailwind Palette Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 mb-6">
          Generate full color scales (50-950) for Tailwind CSS configuration.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <!-- Controls -->
      <div class="max-w-2xl mx-auto mb-10 animate-on-scroll">
         <div class="glass-card p-6 shimmer-card flex flex-col sm:flex-row gap-4 items-center justify-center">
            <div class="flex items-center gap-4 w-full sm:w-auto">
               <div class="relative">
                  <input type="color" id="base-color" value="#3b82f6" class="w-20 h-20 rounded-xl cursor-pointer border-0 bg-transparent">
               </div>
               <div class="flex-1">
                  <span class="text-xs text-slate-500 block mb-1">Base Color (500)</span>
                  <span id="base-label" class="font-mono font-bold text-xl">#3B82F6</span>
               </div>
            </div>
            <button onclick="generatePalette()" class="btn-primary btn-glow whitespace-nowrap w-full sm:w-auto justify-center text-lg px-8 py-3">
               <i class="fas fa-magic mr-2"></i>Generate
            </button>
         </div>
      </div>
      
      <!-- Palette Grid -->
      <div id="palette-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-12 animate-on-scroll">
         <!-- Generated by JS -->
      </div>
      
      <!-- Export Config -->
      <div class="glass-card p-6 shimmer-card animate-on-scroll">
         <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">tailwind.config.js</h3>
            <button onclick="copyConfig()" class="btn-secondary text-sm">
               <i class="fas fa-copy mr-1"></i>Copy Config
            </button>
         </div>
         <div class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 overflow-x-auto">
            <pre id="config-output" class="text-xs font-mono text-slate-600 dark:text-slate-300 whitespace-pre"></pre>
         </div>
      </div>
      
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    (function() {
      const picker = document.getElementById('base-color');
      const label = document.getElementById('base-label');
      
      // --- Logic: Color Manipulation ---
      
      function hexToRgb(hex) {
        hex = hex.replace("#", "");
        return {
          r: parseInt(hex.substring(0, 2), 16),
          g: parseInt(hex.substring(2, 4), 16),
          b: parseInt(hex.substring(4, 6), 16)
        };
      }
      
      function rgbToHex(r, g, b) {
        r = Math.max(0, Math.min(255, Math.round(r)));
        g = Math.max(0, Math.min(255, Math.round(g)));
        b = Math.max(0, Math.min(255, Math.round(b)));
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
      }
      
      // Interpolate between color and target (white or black)
      function mix(color, target, amount) {
        return {
          r: color.r + (target.r - color.r) * amount,
          g: color.g + (target.g - color.g) * amount,
          b: color.b + (target.b - color.b) * amount
        };
      }
      
      const white = { r: 255, g: 255, b: 255 };
      const black = { r: 0, g: 0, b: 0 };
      
      // Tailwind approximate ratios
      const shadesConfig = [
        { name: '50', mix: 0.95, target: 'white' },
        { name: '100', mix: 0.90, target: 'white' },
        { name: '200', mix: 0.75, target: 'white' },
        { name: '300', mix: 0.60, target: 'white' },
        { name: '400', mix: 0.30, target: 'white' },
        { name: '500', mix: 0, target: 'base' }, // Base
        { name: '600', mix: 0.20, target: 'black' },
        { name: '700', mix: 0.40, target: 'black' },
        { name: '800', mix: 0.60, target: 'black' },
        { name: '900', mix: 0.80, target: 'black' },
        { name: '950', mix: 0.90, target: 'black' }
      ];
      
      // --- UI Logic ---
      
      window.generatePalette = function() {
        const hex = picker.value;
        const baseRgb = hexToRgb(hex);
        
        const container = document.getElementById('palette-container');
        container.innerHTML = '';
        
        const configOutput = document.getElementById('config-output');
        let configStr = "theme: {\n  extend: {\n    colors: {\n      primary: {";
        
        shadesConfig.forEach(shade => {
           let mixedColor;
           if (shade.target === 'white') {
             mixedColor = mix(baseRgb, white, shade.mix);
           } else if (shade.target === 'black') {
             mixedColor = mix(baseRgb, black, shade.mix);
           } else {
             mixedColor = baseRgb;
           }
           
           const hexVal = rgbToHex(mixedColor.r, mixedColor.g, mixedColor.b);
           
           // Create Card
           const card = document.createElement('div');
           card.className = "glass-card rounded-xl overflow-hidden flex flex-col justify-between h-32 cursor-pointer hover:scale-105 transition-transform";
           card.innerHTML = `
             <div class="flex-1 flex items-center justify-center" style="background-color: ${hexVal}">
                <span class="font-mono text-xs font-bold" style="color: ${shade.mix > 0.5 && shade.target === 'white' ? '#000' : '#fff'}">${shade.name}</span>
             </div>
             <div class="p-2 bg-white/10 text-center">
                <span class="text-xs font-mono">${hexVal}</span>
             </div>
           `;
           
           card.onclick = () => {
              navigator.clipboard.writeText(hexVal);
              if(window.Devpalettes && window.Devpalettes.Toast) window.Devpalettes.Toast.show(`${hexVal} copied!`);
           };
           
           container.appendChild(card);
           
           // Add to config string
           configStr += `\n        ${shade.name}: '${hexVal}',`;
        });
        
        configStr += "\n      }\n    }\n  }\n}";
        configOutput.textContent = configStr;
      };
      
      window.copyConfig = function() {
        const text = document.getElementById('config-output').textContent;
        navigator.clipboard.writeText(text).then(() => {
           if(window.Devpalettes && window.Devpalettes.Toast) {
             window.Devpalettes.Toast.show('Tailwind Config Copied!', 'success');
           } else {
             alert('Copied!');
           }
        });
      };
      
      // Live update label
      picker.addEventListener('input', (e) => {
        label.textContent = e.target.value.toUpperCase();
      });
      
      // Init
      generatePalette();
      
    })();
  </script>
</body>
</html>
