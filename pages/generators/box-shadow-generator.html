<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate smooth CSS box shadows. Create layered shadow effects for depth.">
  <meta name="keywords" content="box shadow generator, css shadow, smooth shadow, layer shadow">
  <meta name="author" content="Devpalettes">
  
  <title>Box Shadow Generator | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || 
       (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <!-- Header -->
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-gray-100 dark:bg-gray-900/30 text-gray-600 dark:text-gray-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-clone mr-2"></i>CSS Effect
        </span>
        <h1 class="text-4xl font-bold mb-4">Smooth Shadow Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">
          Create beautiful layered box shadows for depth and elevation.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Settings</h3>
             
             <div class="space-y-4">
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Intensity: <span id="val-int">40</span></label>
                   <input type="range" id="ctrl-int" min="0" max="100" value="40" onchange="updateShadow()" class="w-full accent-emerald-500">
                </div>
                
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Diffusion: <span id="val-diff">18</span></label>
                   <input type="range" id="ctrl-diff" min="0" max="60" value="18" onchange="updateShadow()" class="w-full accent-emerald-500">
                </div>
                
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Offset X: <span id="val-x">10</span>px</label>
                   <input type="range" id="ctrl-x" min="-50" max="50" value="10" onchange="updateShadow()" class="w-full accent-emerald-500">
                </div>
                
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Offset Y: <span id="val-y">10</span>px</label>
                   <input type="range" id="ctrl-y" min="-50" max="50" value="10" onchange="updateShadow()" class="w-full accent-emerald-500">
                </div>
                
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Color</label>
                   <input type="color" id="ctrl-color" value="#000000" onchange="updateShadow()" class="w-full h-8 rounded cursor-pointer bg-transparent">
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          
          <!-- Preview -->
          <div class="glass-card p-0 shimmer-card overflow-hidden">
             <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between">
                <h3 class="font-bold text-sm text-slate-500 uppercase tracking-wider">Preview</h3>
                <select id="ctrl-shape" onchange="updateShadow()" class="bg-slate-100 dark:bg-slate-800 rounded px-2 py-1 text-xs">
                   <option value="1">Square</option>
                   <option value="9999">Pill</option>
                   <option value="20">Rounded</option>
                </select>
             </div>
             
             <div class="h-96 flex items-center justify-center bg-slate-100 dark:bg-slate-800">
                <div id="shadow-preview" class="w-64 h-64 bg-white dark:bg-slate-700 flex items-center justify-center font-bold text-slate-400 transition-all duration-300">
                   Hover Me
                </div>
             </div>
          </div>
          
          <!-- Code -->
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
          
        </div>
        
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const preview = document.getElementById('shadow-preview');
    const codeOutput = document.getElementById('code-output');
    
    window.updateShadow = function() {
       const intensity = document.getElementById('ctrl-int').value;
       const diffusion = document.getElementById('ctrl-diff').value;
       const x = document.getElementById('ctrl-x').value;
       const y = document.getElementById('ctrl-y').value;
       const color = document.getElementById('ctrl-color').value;
       const shape = document.getElementById('ctrl-shape').value;
       
       document.getElementById('val-int').textContent = intensity;
       document.getElementById('val-diff').textContent = diffusion;
       document.getElementById('val-x').textContent = x;
       document.getElementById('val-y').textContent = y;
       
       // Generate Smooth Shadow Logic (Simplified Layering)
       const hexToRgb = (hex) => {
          let r=0, g=0, b=0;
          if(hex.length === 4){
             r = parseInt(hex[1]+hex[1],16); g = parseInt(hex[2]+hex[2],16); b = parseInt(hex[3]+hex[3],16);
          } else if (hex.length === 7) {
             r = parseInt(hex.slice(1,3),16); g = parseInt(hex.slice(3,5),16); b = parseInt(hex.slice(5,7),16);
          }
          return {r,g,b};
       }
       
       const rgb = hexToRgb(color);
       const alpha = intensity / 100;
       
       // Create layers
       let layers = [];
       for(let i=1; i<=4; i++) {
          layers.push(`${x*i*0.5}px ${y*i*0.5}px ${diffusion*i}px rgba(${rgb.r},${rgb.g},${rgb.b},${alpha / (i*1.5)})`);
       }
       
       const shadowCSS = layers.join(',\n            ');
       
       // Apply
       preview.style.boxShadow = shadowCSS;
       preview.style.borderRadius = `${shape}px`;
       
       // Code
       const css = `.shadow-smooth {
  border-radius: ${shape}px;
  box-shadow: ${shadowCSS};
}`;
       codeOutput.textContent = css;
    };
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       navigator.clipboard.writeText(text);
       if(window.Devpalettes && window.Devpalettes.Toast) window.Devpalettes.Toast.show('Code Copied!', 'success');
    };
    
    updateShadow();
  </script>
</body>
</html>
