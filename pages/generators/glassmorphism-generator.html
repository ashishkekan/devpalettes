<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate Glassmorphism CSS effects. Create frosted glass UI components with backdrop blur.">
  <meta name="keywords" content="glassmorphism generator, css glass effect, frosted glass css, blur background">
  <meta name="author" content="Devpalettes">
  
  <title>Glassmorphism Generator | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || 
       (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <!-- Header -->
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-sky-100 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-wind mr-2"></i>CSS Effect
        </span>
        <h1 class="text-4xl font-bold mb-4">Glassmorphism Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">
          Create modern frosted glass effects with backdrop blur.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Settings</h3>
             
             <div class="space-y-4">
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Blur: <span id="val-blur">16</span>px</label>
                   <input type="range" id="ctrl-blur" min="0" max="50" value="16" onchange="updateGlass()" class="w-full accent-emerald-500">
                </div>
                
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Opacity: <span id="val-opac">0.5</span></label>
                   <input type="range" id="ctrl-opac" min="0" max="100" value="50" onchange="updateGlass()" class="w-full accent-emerald-500">
                </div>
                
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Border Radius: <span id="val-rad">16</span>px</label>
                   <input type="range" id="ctrl-rad" min="0" max="50" value="16" onchange="updateGlass()" class="w-full accent-emerald-500">
                </div>
                
                <div>
                   <label class="block text-xs font-semibold mb-1 text-slate-500">Border Color</label>
                   <input type="color" id="ctrl-border" value="#ffffff" onchange="updateGlass()" class="w-full h-8 rounded cursor-pointer bg-transparent">
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          
          <!-- Preview -->
          <div class="glass-card p-0 shimmer-card overflow-hidden">
             <div class="p-4 border-b border-slate-100 dark:border-slate-700">
                <h3 class="font-bold text-sm text-slate-500 uppercase tracking-wider">Preview</h3>
             </div>
             
             <!-- Colorful Background to show effect -->
             <div class="h-96 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-10">
                <div id="glass-preview" class="w-full h-64 flex items-center justify-center text-white font-bold text-xl transition-all duration-300">
                   <div class="text-center">
                      <i class="fas fa-gem text-4xl mb-2 opacity-80"></i>
                      <div>Glass Effect</div>
                   </div>
                </div>
             </div>
          </div>
          
          <!-- Code -->
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
          
        </div>
        
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const preview = document.getElementById('glass-preview');
    const codeOutput = document.getElementById('code-output');
    
    window.updateGlass = function() {
       const blur = document.getElementById('ctrl-blur').value;
       const opac = document.getElementById('ctrl-opac').value / 100;
       const rad = document.getElementById('ctrl-rad').value;
       const border = document.getElementById('ctrl-border').value;
       
       document.getElementById('val-blur').textContent = blur;
       document.getElementById('val-opac').textContent = opac.toFixed(2);
       document.getElementById('val-rad').textContent = rad;
       
       // Apply Styles
       preview.style.backdropFilter = `blur(${blur}px)`;
       preview.style.webkitBackdropFilter = `blur(${blur}px)`;
       preview.style.backgroundColor = `rgba(255, 255, 255, ${opac})`;
       preview.style.borderRadius = `${rad}px`;
       preview.style.border = `1px solid ${border}`;
       
       generateCode(blur, opac, rad, border);
    };
    
    function generateCode(b, o, r, border) {
       const css = `.glass-card {
  background: rgba(255, 255, 255, ${o.toFixed(2)});
  backdrop-filter: blur(${b}px);
  -webkit-backdrop-filter: blur(${b}px);
  border-radius: ${r}px;
  border: 1px solid ${border};
}`;
       codeOutput.textContent = css;
    }
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       navigator.clipboard.writeText(text);
       if(window.Devpalettes && window.Devpalettes.Toast) window.Devpalettes.Toast.show('Code Copied!', 'success');
    };
    
    updateGlass();
  </script>
</body>
</html>
