<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate CSS cubic-bezier timing functions. Visualize animation curves.">
  <meta name="keywords" content="cubic bezier generator, css easing, animation timing, css transition">
  <meta name="author" content="Devpalettes">
  
  <title>Cubic Bezier Generator | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="../../assets/js/theme-preload.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-chart-line mr-2"></i>Animation
        </span>
        <h1 class="text-4xl font-bold mb-4">Cubic Bezier Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">
          Create custom animation timing functions with visual control.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Presets</h3>
             <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="setPreset(0.25, 0.1, 0.25, 1.0)" class="preset-btn active px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Ease</button>
                <button onclick="setPreset(0.42, 0, 1.0, 1.0)" class="preset-btn px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Ease In</button>
                <button onclick="setPreset(0, 0, 0.2, 1.0)" class="preset-btn px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Ease Out</button>
                <button onclick="setPreset(0.68, -0.55, 0.27, 1.55)" class="preset-btn px-2 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Back</button>
             </div>
             
             <h3 class="font-bold mb-4 text-lg">Controls</h3>
             <div class="space-y-3">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">X1: <span id="v-x1">0.25</span></label>
                   <input type="range" id="c-x1" step="0.01" min="0" max="1" value="0.25" onchange="updateBezier()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Y1: <span id="v-y1">0.10</span></label>
                   <input type="range" id="c-y1" step="0.01" min="-1" max="1" value="0.1" onchange="updateBezier()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">X2: <span id="v-x2">0.25</span></label>
                   <input type="range" id="c-x2" step="0.01" min="0" max="1" value="0.25" onchange="updateBezier()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Y2: <span id="v-y2">1.00</span></label>
                   <input type="range" id="c-y2" step="0.01" min="-1" max="1" value="1" onchange="updateBezier()" class="w-full accent-emerald-500">
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          
          <div class="glass-card p-6 shimmer-card min-h-[300px] flex items-center justify-center">
             <!-- Simple Animation Preview -->
             <div id="ball" class="w-16 h-16 bg-gradient-to-br from-amber-400 to-rose-500 rounded-full shadow-lg" style="animation: move 2s infinite alternate;"></div>
          </div>
          
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
          
        </div>
        
      </div>
    </div>
  </main>
  
  <style>
    @keyframes move {
       0% { transform: translateX(-150px); }
       100% { transform: translateX(150px); }
    }
  </style>
  
  <div id="footer-container"></div>
  
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/enhancements.js"></script>
  
  <script>
    const ball = document.getElementById('ball');
    const codeOutput = document.getElementById('code-output');
    
    window.updateBezier = function() {
       const x1 = document.getElementById('c-x1').value;
       const y1 = document.getElementById('c-y1').value;
       const x2 = document.getElementById('c-x2').value;
       const y2 = document.getElementById('c-y2').value;
       
       document.getElementById('v-x1').textContent = x1;
       document.getElementById('v-y1').textContent = y1;
       document.getElementById('v-x2').textContent = x2;
       document.getElementById('v-y2').textContent = y2;
       
       const timing = `cubic-bezier(${x1}, ${y1}, ${x2}, ${y2})`;
       
       ball.style.animationTimingFunction = timing;
       generateCode(timing);
    };
    
    function generateCode(t) {
       const css = `.animated-element {
  transition-timing-function: ${t};
  /* OR */
  animation-timing-function: ${t};
}`;
       codeOutput.textContent = css;
    }
    
    window.setCode = function(x1, y1, x2, y2) {
       // Internal use
       document.getElementById('c-x1').value = x1;
       document.getElementById('c-y1').value = y1;
       document.getElementById('c-x2').value = x2;
       document.getElementById('c-y2').value = y2;
       updateBezier();
    };
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       Clipboard.writeText(text);
       if(window.Devpalettes && window.Devpalettes.Toast) window.Devpalettes.Toast.show('Code Copied!', 'success');
    };
    
    updateBezier();
  </script>
</body>
</html>
