<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGB to HEX Converter | ColorPallates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">

  <div id="navbar-container"></div>

  <main class="pt-24 pb-16 min-h-screen">
    <div class="max-w-4xl mx-auto py-6 sm:px-6 lg:px-8">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-3">RGB ↔ HEX Converter</h1>
        <p class="text-slate-600 dark:text-slate-400">Instant bidirectional conversion • Live preview</p>
      </div>

      <div class="grid md:grid-cols-2 gap-8">
        <!-- Preview -->
        <div class="glass-card p-8 text-center">
          <div id="preview-box" class="w-full aspect-square rounded-2xl shadow-2xl mb-8 transition-all" style="background-color: #10b981;"></div>
          <input type="color" id="color-picker" value="#10b981" class="w-28 h-28 rounded-xl cursor-pointer border-4 border-white dark:border-slate-800 shadow">
        </div>

        <!-- Controls -->
        <div class="space-y-8">
          <!-- HEX -->
          <div class="glass-card p-6">
            <label class="block text-sm font-semibold mb-2">HEX Code</label>
            <div class="flex gap-3">
              <input type="text" id="hex-input" value="#10B981" maxlength="7"
                     class="input-field font-mono text-2xl text-center uppercase flex-1">
              <button id="copy-hex" class="btn-secondary px-6">
                <i class="fas fa-copy"></i>
              </button>
            </div>
          </div>

          <!-- RGB -->
          <div class="glass-card p-6">
            <label class="block text-sm font-semibold mb-4">RGB Values</label>
            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="text-xs text-slate-500 block mb-1 text-center">Red</label>
                <input type="number" id="r" min="0" max="255" value="16" class="input-field text-center text-xl">
              </div>
              <div>
                <label class="text-xs text-slate-500 block mb-1 text-center">Green</label>
                <input type="number" id="g" min="0" max="255" value="185" class="input-field text-center text-xl">
              </div>
              <div>
                <label class="text-xs text-slate-500 block mb-1 text-center">Blue</label>
                <input type="number" id="b" min="0" max="255" value="129" class="input-field text-center text-xl">
              </div>
            </div>
            <div class="mt-6 flex items-center justify-between bg-slate-100 dark:bg-slate-800 rounded-xl p-4">
              <code id="rgb-output" class="font-mono text-lg">rgb(16, 185, 129)</code>
              <button id="copy-rgb" class="btn-secondary text-sm">
                <i class="fas fa-copy"></i> Copy RGB
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script src="js/rgb-hex-converter.js"></script>
</body>
</html>
