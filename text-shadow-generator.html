<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate CSS Text Shadow effects. Create glowing, outlined, or 3D text shadows.">
  <meta name="keywords" content="text shadow generator, css text effect, neon text css, long shadow">
  <meta name="author" content="ColorPalettesHub">
  
  <title>Text Shadow Generator | ColorPalettesHub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
  </script>
  <script> tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } } </script>
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-cyan-100 dark:bg-cyan-900/30 text-cyan-600 dark:text-cyan-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-italic mr-2"></i>CSS Effect
        </span>
        <h1 class="text-4xl font-bold mb-4">Text Shadow Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">Add depth and style to your typography.</p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Settings</h3>
             <div class="space-y-3">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Text Content</label>
                   <input type="text" id="txt-text" value="SHADOW" oninput="updateShadow()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm font-bold">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Shadow Color</label>
                   <input type="color" id="txt-color" value="#10b981" onchange="updateShadow()" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">X Offset: <span id="v-x">2</span>px</label>
                   <input type="range" id="txt-x" min="-20" max="20" value="2" onchange="updateShadow()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Y Offset: <span id="v-y">2</span>px</label>
                   <input type="range" id="txt-y" min="-20" max="20" value="2" onchange="updateShadow()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Blur: <span id="v-b">4</span>px</label>
                   <input type="range" id="txt-b" min="0" max="50" value="4" onchange="updateShadow()" class="w-full accent-emerald-500">
                </div>
             </div>
             
             <div class="mt-4">
                <label class="block text-xs font-semibold text-slate-500 mb-1">Presets</label>
                <div class="grid grid-cols-2 gap-2">
                   <button onclick="setPreset(0, 0, 20)" class="px-2 py-1 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700 hover:bg-emerald-500 hover:text-white">Glow</button>
                   <button onclick="setPreset(4, 4, 0)" class="px-2 py-1 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700 hover:bg-emerald-500 hover:text-white">Hard</button>
                   <button onclick="setPreset(1, 1, 2)" class="px-2 py-1 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700 hover:bg-emerald-500 hover:text-white">Soft</button>
                   <button onclick="setPreset(0, 0, 0)" class="px-2 py-1 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700 hover:bg-emerald-500 hover:text-white">Reset</button>
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          <div class="glass-card p-8 shimmer-card min-h-[300px] flex items-center justify-center bg-slate-800">
             <h1 id="shadow-preview" class="text-6xl font-black text-white transition-all duration-300">SHADOW</h1>
          </div>
          
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  <script src="js/main.js"></script>
  <script src="js/enhancements.js"></script>
  
  <script>
    const preview = document.getElementById('shadow-preview');
    const codeOutput = document.getElementById('code-output');
    
    window.updateShadow = function() {
       const x = document.getElementById('txt-x').value;
       const y = document.getElementById('txt-y').value;
       const b = document.getElementById('txt-b').value;
       const c = document.getElementById('txt-color').value;
       const text = document.getElementById('txt-text').value;
       
       document.getElementById('v-x').textContent = x;
       document.getElementById('v-y').textContent = y;
       document.getElementById('v-b').textContent = b;
       
       preview.textContent = text || "TEXT";
       preview.style.textShadow = `${x}px ${y}px ${b}px ${c}`;
       generateCode(x, y, b, c);
    };
    
    function generateCode(x, y, b, c) {
       const css = `.text-shadow {
  text-shadow: ${x}px ${y}px ${b}px ${c};
}`;
       codeOutput.textContent = css;
    }
    
    window.setPreset = function(x, y, b) {
       document.getElementById('txt-x').value = x;
       document.getElementById('txt-y').value = y;
       document.getElementById('txt-b').value = b;
       updateShadow();
    };
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       navigator.clipboard.writeText(text);
       if(window.ColorPalettesHub && window.ColorPalettesHub.Toast) window.ColorPalettesHub.Toast.show('Code Copied!', 'success');
    };
    
    updateShadow();
  </script>
</body>
</html>
