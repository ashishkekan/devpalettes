<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate CSS image filters. Apply blur, grayscale, brightness, and contrast effects.">
  <meta name="keywords" content="css filter generator, image filter css, css effects, photo filter css">
  <meta name="author" content="ColorPalettesHub">
  
  <title>CSS Filter Generator | ColorPalettesHub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || 
       (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-teal-100 dark:bg-teal-900/30 text-teal-600 dark:text-teal-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-image mr-2"></i>Image Effect
        </span>
        <h1 class="text-4xl font-bold mb-4">CSS Filter Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">
          Apply Instagram-like filters to images using pure CSS.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Filters</h3>
             
             <div class="space-y-4">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Blur: <span id="v-blur">0</span>px</label>
                   <input type="range" id="f-blur" min="0" max="20" value="0" onchange="updateFilter()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Brightness: <span id="v-bri">100</span>%</label>
                   <input type="range" id="f-bri" min="0" max="200" value="100" onchange="updateFilter()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Contrast: <span id="v-con">100</span>%</label>
                   <input type="range" id="f-con" min="0" max="200" value="100" onchange="updateFilter()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Grayscale: <span id="v-gray">0</span>%</label>
                   <input type="range" id="f-gray" min="0" max="100" value="0" onchange="updateFilter()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Sepia: <span id="v-sep">0</span>%</label>
                   <input type="range" id="f-sep" min="0" max="100" value="0" onchange="updateFilter()" class="w-full accent-emerald-500">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Hue Rotate: <span id="v-hue">0</span>deg</label>
                   <input type="range" id="f-hue" min="0" max="360" value="0" onchange="updateFilter()" class="w-full accent-emerald-500">
                </div>
             </div>
             
             <button onclick="resetFilters()" class="btn-secondary w-full py-2 mt-4 text-sm"><i class="fas fa-undo mr-1"></i>Reset</button>
          </div>
        </div>
        
        <!-- Preview & Code -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          
          <div class="glass-card p-0 shimmer-card overflow-hidden">
             <div class="p-4 border-b border-slate-100 dark:border-slate-700">
                <h3 class="font-bold text-sm text-slate-500 uppercase tracking-wider">Preview</h3>
             </div>
             
             <div class="h-96 bg-slate-100 dark:bg-slate-800 flex items-center justify-center p-8">
                <img id="filter-preview" src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400" class="max-w-full max-h-full rounded-lg shadow-2xl transition-all duration-300 object-cover" alt="Preview Image">
             </div>
          </div>
          
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">CSS Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4"><i class="fas fa-copy mr-1"></i>Copy</button>
             </div>
             <pre id="code-output" class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 text-xs font-mono text-slate-600 dark:text-slate-300 overflow-auto max-h-40"></pre>
          </div>
          
        </div>
        
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script src="js/main.js"></script>
  <script src="js/enhancements.js"></script>
  
  <script>
    const preview = document.getElementById('filter-preview');
    const codeOutput = document.getElementById('code-output');
    
    window.updateFilter = function() {
       const bl = document.getElementById('f-blur').value;
       const br = document.getElementById('f-bri').value;
       const co = document.getElementById('f-con').value;
       const gr = document.getElementById('f-gray').value;
       const se = document.getElementById('f-sep').value;
       const hu = document.getElementById('f-hue').value;
       
       document.getElementById('v-blur').textContent = bl;
       document.getElementById('v-bri').textContent = br;
       document.getElementById('v-con').textContent = co;
       document.getElementById('v-gray').textContent = gr;
       document.getElementById('v-sep').textContent = se;
       document.getElementById('v-hue').textContent = hu;
       
       const filterStr = `blur(${bl}px) brightness(${br}%) contrast(${co}%) grayscale(${gr}%) sepia(${se}%) hue-rotate(${hu}deg)`;
       
       preview.style.filter = filterStr;
       generateCode(bl, br, co, gr, se, hu);
    };
    
    function generateCode(bl, br, co, gr, se, hu) {
       const css = `.filtered-image {
  filter: 
    blur(${bl}px) 
    brightness(${br}%) 
    contrast(${co}%) 
    grayscale(${gr}%) 
    sepia(${se}%) 
    hue-rotate(${hu}deg);
}`;
       codeOutput.textContent = css;
    }
    
    window.resetFilters = function() {
       document.getElementById('f-blur').value = 0;
       document.getElementById('f-bri').value = 100;
       document.getElementById('f-con').value = 100;
       document.getElementById('f-gray').value = 0;
       document.getElementById('f-sep').value = 0;
       document.getElementById('f-hue').value = 0;
       updateFilter();
    };
    
    window.copyCode = function() {
       const text = codeOutput.textContent;
       navigator.clipboard.writeText(text);
       if(window.ColorPalettesHub && window.ColorPalettesHub.Toast) window.ColorPalettesHub.Toast.show('Code Copied!', 'success');
    };
    
    updateFilter();
  </script>
</body>
</html>
