<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Compare two texts side-by-side and highlight differences instantly. Added and removed words are clearly marked.">
  <meta name="keywords" content="text diff checker, compare text side by side, diff tool, text difference highlighter">
  <meta name="author" content="Devpalettes">
  
  <title>Text Diff Checker - Side by Side Comparison | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || 
       (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <style>
    /* Diff Highlight Styles */
    .diff-added {
       background-color: rgba(34, 197, 94, 0.2);
       color: #166534;
       text-decoration: none;
       border-radius: 3px;
       padding: 0 2px;
    }
    .dark .diff-added {
       background-color: rgba(34, 197, 94, 0.15);
       color: #86efac;
    }
    
    .diff-removed {
       background-color: rgba(239, 68, 68, 0.2);
       color: #991b1b;
       text-decoration: line-through;
       border-radius: 3px;
       padding: 0 2px;
    }
    .dark .diff-removed {
       background-color: rgba(239, 68, 68, 0.15);
       color: #fca5a5;
    }
    
    /* Textarea Custom Scrollbar */
    textarea::-webkit-scrollbar { width: 8px; height: 8px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark textarea::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <!-- Visualizer Background -->
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div class="gradient-blob blob-3"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <!-- Header -->
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-columns mr-2"></i>Comparison Tool
        </span>
        <h1 class="text-4xl font-bold mb-4">Text Diff Checker</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">
          Enter text in the Left Pane (Original) and Right Pane (Modified) to compare.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <!-- Split Input Panes -->
      <div class="grid md:grid-cols-2 gap-6 mb-6 animate-on-scroll">
        
        <!-- Left Pane: Original -->
        <div class="glass-card p-0 shimmer-card overflow-hidden flex flex-col">
           <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
              <h3 class="font-bold text-sm text-red-500 uppercase tracking-wider flex items-center gap-2">
                 <i class="fas fa-file-alt"></i> Original Text
              </h3>
              <button onclick="clearPane('a')" class="text-xs text-slate-400 hover:text-red-500 transition-colors">Clear</button>
           </div>
           <textarea id="text-a" class="flex-1 w-full p-4 bg-transparent resize-none focus:outline-none text-sm font-mono min-h-[300px]" placeholder="Paste your original text here..."></textarea>
        </div>
        
        <!-- Right Pane: Modified -->
        <div class="glass-card p-0 shimmer-card overflow-hidden flex flex-col">
           <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
              <h3 class="font-bold text-sm text-emerald-500 uppercase tracking-wider flex items-center gap-2">
                 <i class="fas fa-edit"></i> Modified Text
              </h3>
              <button onclick="clearPane('b')" class="text-xs text-slate-400 hover:text-red-500 transition-colors">Clear</button>
           </div>
           <textarea id="text-b" class="flex-1 w-full p-4 bg-transparent resize-none focus:outline-none text-sm font-mono min-h-[300px]" placeholder="Paste the changed text here..."></textarea>
        </div>
        
      </div>
      
      <!-- Controls -->
      <div class="flex flex-col sm:flex-row justify-center gap-4 mb-10 animate-on-scroll">
         <button onclick="compareTexts()" class="btn-primary btn-glow text-lg px-10 py-4">
            <i class="fas fa-code-compare mr-2"></i>Compare Texts
         </button>
         <button onclick="loadSamples()" class="btn-secondary text-lg px-8 py-4">
            <i class="fas fa-flask mr-2"></i>Load Sample
         </button>
      </div>
      
      <!-- Result Area -->
      <div class="glass-card p-6 shimmer-card animate-on-scroll">
        
         <!-- Stats Bar -->
         <div class="flex flex-wrap justify-between items-center mb-4 pb-4 border-b border-slate-100 dark:border-slate-700 gap-4">
            <div class="flex items-center gap-6">
               <span class="flex items-center gap-2 text-sm font-medium">
                  <span class="w-3 h-3 rounded-full bg-red-500"></span> Removed: <span id="removed-count" class="font-bold text-red-500">0</span>
               </span>
               <span class="flex items-center gap-2 text-sm font-medium">
                  <span class="w-3 h-3 rounded-full bg-emerald-500"></span> Added: <span id="added-count" class="font-bold text-emerald-500">0</span>
               </span>
            </div>
            <button onclick="copyResult()" class="text-sm text-slate-500 hover:text-emerald-500 font-medium transition-colors">
               <i class="fas fa-copy mr-1"></i> Copy Result
            </button>
         </div>
         
         <!-- Output Box -->
         <div id="result-output" class="min-h-[150px] p-4 bg-slate-100 dark:bg-slate-800/50 rounded-xl font-mono text-sm leading-loose text-slate-700 dark:text-slate-300 whitespace-pre-wrap break-words">
            Click "Compare Texts" to see the highlighted difference.
         </div>
         
      </div>
      
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script src="js/main.js"></script>
  <script src="js/enhancements.js"></script>
  
  <script>
    (function() {
      const textA = document.getElementById('text-a');
      const textB = document.getElementById('text-b');
      const resultOutput = document.getElementById('result-output');
      const addedCountEl = document.getElementById('added-count');
      const removedCountEl = document.getElementById('removed-count');
      
      // --- LCS Diff Logic ---
      
      function escapeHtml(text) {
         if (!text) return '';
         return text
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
      }
      
      function diff(oldText, newText) {
        // Split by word (keeping spaces logic simple: split by space)
        // For a more robust version, you might use regex to keep punctuation attached.
        const oldWords = oldText.split(/(\s+)/); // Keep delimiters
        const newWords = newText.split(/(\s+)/);
        
        // Create matrix for LCS
        const m = oldWords.length;
        const n = newWords.length;
        const dp = [];
        for(let i=0; i<=m; i++){
           dp[i] = [];
           for(let j=0; j<=n; j++){
              if(i===0) dp[i][j] = 0;
              else if(j===0) dp[i][j] = 0;
              else if(oldWords[i-1] === newWords[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
              else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
           }
        }
        
        // Backtrack to generate diff
        let i = m, j = n;
        let result = [];
        let added = 0;
        let removed = 0;
        
        while(i > 0 || j > 0){
           if (i > 0 && j > 0 && oldWords[i-1] === newWords[j-1]){
              result.unshift(escapeHtml(oldWords[i-1]));
              i--; j--;
           } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])){
              // Added word
              let word = escapeHtml(newWords[j-1]);
              if(!/^\s+$/.test(word)) { // Ignore pure whitespace for counting
                 result.unshift(`<span class="diff-added">${word}</span>`);
                 added++;
              } else {
                 result.unshift(word); // Just whitespace
              }
              j--;
           } else if (i > 0 && (j === 0 || dp[i-1][j] > dp[i][j-1])){
              // Removed word
              let word = escapeHtml(oldWords[i-1]);
              if(!/^\s+$/.test(word)) {
                 result.unshift(`<span class="diff-removed">${word}</span>`);
                 removed++;
              } else {
                 result.unshift(word);
              }
              i--;
           }
        }
        
        return { html: result.join(''), added, removed };
      }
      
      window.compareTexts = function() {
         const valA = textA.value;
         const valB = textB.value;
         
         if (!valA && !valB) {
            resultOutput.innerHTML = '<span class="text-slate-400">No text to compare.</span>';
            return;
         }
         
         const res = diff(valA, valB);
         
         resultOutput.innerHTML = res.html || '<span class="text-slate-400">Texts are identical.</span>';
         addedCountEl.textContent = res.added;
         removedCountEl.textContent = res.removed;
      };
      
      window.clearPane = function(id) {
         if(id === 'a') textA.value = '';
         else textB.value = '';
      };
      
      window.copyResult = function() {
         const text = resultOutput.innerText;
         navigator.clipboard.writeText(text).then(() => {
             if(window.Devpalettes && window.Devpalettes.Toast) {
               window.Devpalettes.Toast.show('Result Copied!', 'success');
             } else {
               alert('Result Copied!');
             }
         });
      };
      
      window.loadSamples = function() {
         textA.value = "The quick brown fox jumps over the lazy dog. This is a sample text for testing the diff checker. It works perfectly.";
         textB.value = "The fast brown fox jumped over the lazy cat. This is an example text for testing the diff checker. It works perfectly now!";
      };
      
    })();
  </script>
</body>
</html>
