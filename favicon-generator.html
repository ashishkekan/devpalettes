<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate favicons from text or images. Create instant website icons.">
  <meta name="keywords" content="favicon generator, website icon, logo generator, app icon">
  <meta name="author" content="ColorPalettesHub">
  
  <title>Favicon Generator | ColorPalettesHub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
  </script>
  <script> tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } } </script>
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-violet-100 dark:bg-violet-900/30 text-violet-600 dark:text-violet-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-image mr-2"></i>Asset Tool
        </span>
        <h1 class="text-4xl font-bold mb-4">Favicon Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">Create instant favicons from text or icons.</p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-2 gap-8">
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Settings</h3>
             
             <div class="space-y-4">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Text (1-2 chars)</label>
                   <input type="text" id="fav-text" value="CP" maxlength="2" oninput="draw()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm text-center font-bold text-2xl">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                   <div>
                      <label class="block text-xs font-semibold text-slate-500 mb-1">Background</label>
                      <input type="color" id="fav-bg" value="#4f46e5" onchange="draw()" class="w-full h-10 rounded cursor-pointer bg-transparent">
                   </div>
                   <div>
                      <label class="block text-xs font-semibold text-slate-500 mb-1">Text Color</label>
                      <input type="color" id="fav-color" value="#ffffff" onchange="draw()" class="w-full h-10 rounded cursor-pointer bg-transparent">
                   </div>
                </div>
                
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Size</label>
                   <select id="fav-size" onchange="draw()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm">
                      <option value="16">16x16 (Browser Tab)</option>
                      <option value="32" selected>32x32 (High Res)</option>
                      <option value="64">64x64 (Desktop)</option>
                      <option value="128">128x128 (App Icon)</option>
                   </select>
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview -->
        <div class="space-y-6 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card flex flex-col items-center justify-center min-h-[200px]">
             <canvas id="fav-canvas" class="shadow-lg rounded" style="image-rendering: pixelated;"></canvas>
             <p class="text-xs text-slate-400 mt-2">Preview (Scaled)</p>
          </div>
          
          <button onclick="download()" class="btn-primary btn-glow w-full py-3 justify-center">
             <i class="fas fa-download mr-1"></i>Download Favicon
          </button>
        </div>
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  <script src="js/main.js"></script>
  <script src="js/enhancements.js"></script>
  
  <script>
    const canvas = document.getElementById('fav-canvas');
    const ctx = canvas.getContext('2d');
    
    window.draw = function() {
       const text = document.getElementById('fav-text').value || "A";
       const bg = document.getElementById('fav-bg').value;
       const color = document.getElementById('fav-color').value;
       const size = parseInt(document.getElementById('fav-size').value);
       
       canvas.width = size;
       canvas.height = size;
       
       // Draw Background
       ctx.fillStyle = bg;
       ctx.fillRect(0, 0, size, size);
       
       // Draw Text
       ctx.fillStyle = color;
       ctx.textAlign = "center";
       ctx.textBaseline = "middle";
       // Scale font size based on canvas size
       const fontSize = size * 0.6;
       ctx.font = `bold ${fontSize}px Inter, sans-serif`;
       ctx.fillText(text, size/2, size/2);
    };
    
    window.download = function() {
       const link = document.createElement('a');
       link.download = 'favicon.ico';
       link.href = canvas.toDataURL('image/png');
       link.click();
    };
    
    draw();
  </script>
</body>
</html>
