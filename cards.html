<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPORMATCH - Memory Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0015;
            --bg-purple: #1a0a2e;
            --neon-pink: #FF77FF;
            --neon-cyan: #00FFFF;
            --neon-purple: #BF00FF;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Orbitron', monospace;
        }

        /* Animated background */
        .vapor-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(180deg, 
                    #0a0015 0%, 
                    #1a0a2e 30%, 
                    #2d1b4e 50%,
                    #4a1942 70%,
                    #1a0a2e 100%);
            z-index: -3;
        }

        .vapor-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255, 119, 255, 0.3) 0%, transparent 60%);
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Neon grid */
        .neon-grid {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center top;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* Sun element */
        .vapor-sun {
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: linear-gradient(180deg, 
                #FF77FF 0%, 
                #FF6B35 40%, 
                #FFD700 100%);
            border-radius: 50%;
            filter: blur(2px);
            z-index: -1;
            mask-image: linear-gradient(to bottom, black 0%, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, black 50%, transparent 100%);
            animation: sunPulse 6s ease-in-out infinite;
        }

        .vapor-sun::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 8px,
                rgba(10, 0, 21, 0.8) 8px,
                rgba(10, 0, 21, 0.8) 16px
            );
        }

        @keyframes sunPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        /* Noise overlay */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Card styles */
        .card-container {
            perspective: 1000px;
        }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-back {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card-back::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(255, 119, 255, 0.1) 0%, 
                transparent 50%,
                rgba(0, 255, 255, 0.1) 100%);
        }

        .card-front {
            background: linear-gradient(135deg, 
                rgba(30, 20, 50, 0.9) 0%, 
                rgba(20, 10, 40, 0.95) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transform: rotateY(180deg);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card.active .card-front {
            box-shadow: 
                0 0 20px rgba(255, 119, 255, 0.5),
                0 0 40px rgba(255, 119, 255, 0.3),
                inset 0 0 20px rgba(255, 119, 255, 0.1);
            border-color: var(--neon-pink);
        }

        .card.matched {
            opacity: 0.5;
            pointer-events: none;
        }

        .card.matched .card-front {
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.4),
                inset 0 0 15px rgba(0, 255, 255, 0.1);
            border-color: var(--neon-cyan);
        }

        .card.shake {
            animation: shakeAnim 0.5s ease-in-out;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20% { transform: rotateY(180deg) translateX(-8px); }
            40% { transform: rotateY(180deg) translateX(8px); }
            60% { transform: rotateY(180deg) translateX(-6px); }
            80% { transform: rotateY(180deg) translateX(6px); }
        }

        .card-icon {
            width: 60%;
            height: 60%;
            filter: drop-shadow(0 0 8px currentColor);
        }

        .card-back-icon {
            width: 50%;
            height: 50%;
            opacity: 0.3;
        }

        /* Glow button */
        .glow-btn {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .glow-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 119, 255, 0.2) 50%, 
                transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .glow-btn:hover::before {
            transform: translateX(100%);
        }

        .glow-btn:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 119, 255, 0.3);
        }

        .glow-btn.active {
            background: linear-gradient(135deg, 
                rgba(255, 119, 255, 0.3) 0%, 
                rgba(0, 255, 255, 0.2) 100%);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 119, 255, 0.4);
        }

        /* Stats panel */
        .stats-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 2rem;
        }

        .stat-value {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Particles canvas */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        /* Win modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 0, 21, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, 
                rgba(30, 20, 50, 0.95) 0%, 
                rgba(20, 10, 40, 0.98) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--neon-pink);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            box-shadow: 
                0 0 60px rgba(255, 119, 255, 0.3),
                0 0 100px rgba(0, 255, 255, 0.2);
            transform: scale(0.9);
            transition: transform 0.5s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        /* Title glow animation */
        .title-glow {
            text-shadow: 
                0 0 10px rgba(255, 119, 255, 0.8),
                0 0 20px rgba(255, 119, 255, 0.6),
                0 0 40px rgba(255, 119, 255, 0.4);
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(255, 119, 255, 0.8),
                    0 0 20px rgba(255, 119, 255, 0.6),
                    0 0 40px rgba(255, 119, 255, 0.4);
            }
            50% { 
                text-shadow: 
                    0 0 15px rgba(0, 255, 255, 0.8),
                    0 0 30px rgba(0, 255, 255, 0.6),
                    0 0 60px rgba(0, 255, 255, 0.4);
            }
        }

        /* Responsive grid */
        .game-grid {
            display: grid;
            gap: 8px;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 640px) {
            .game-grid {
                gap: 6px;
                max-width: 95vw;
            }
        }

        /* Focus states */
        .card:focus {
            outline: none;
        }

        .card:focus-visible .card-back {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .card {
                transition: none;
            }
            .vapor-sun,
            .neon-grid,
            .title-glow {
                animation: none;
            }
        }
    </style>
</head>
<body class="min-h-screen text-white">
    <!-- Background elements -->
    <div class="vapor-bg"></div>
    <div class="neon-grid"></div>
    <div class="vapor-sun"></div>
    <div class="noise-overlay"></div>
    
    <!-- Particles -->
    <canvas id="particles"></canvas>

    <!-- Main content -->
    <div class="relative z-10 min-h-screen flex flex-col px-4 py-6">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="font-display text-3xl sm:text-5xl font-black tracking-widest title-glow mb-2">
                VAPORMATCH
            </h1>
            <p class="text-sm sm:text-base text-gray-400 tracking-wider">
                Memory Challenge in the Digital Dreamscape
            </p>
        </header>

        <!-- Stats Panel -->
        <div class="stats-panel flex justify-center items-center gap-6 sm:gap-12 mx-auto mb-6 flex-wrap">
            <div class="text-center">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Time</div>
                <div class="stat-value text-xl sm:text-2xl font-bold" id="timer">00:00</div>
            </div>
            <div class="text-center">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Moves</div>
                <div class="stat-value text-xl sm:text-2xl font-bold" id="moves">0</div>
            </div>
            <div class="text-center">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Pairs</div>
                <div class="stat-value text-xl sm:text-2xl font-bold">
                    <span id="matched">0</span>/<span id="total">0</span>
                </div>
            </div>
        </div>

        <!-- Game Grid -->
        <main class="flex-1 flex items-center justify-center">
            <div class="game-grid w-full" id="gameGrid"></div>
        </main>

        <!-- Controls -->
        <footer class="mt-6">
            <div class="flex justify-center items-center gap-3 flex-wrap mb-4">
                <button class="glow-btn active" data-difficulty="easy" onclick="setDifficulty('easy')">
                    EASY 4x4
                </button>
                <button class="glow-btn" data-difficulty="medium" onclick="setDifficulty('medium')">
                    MEDIUM 6x6
                </button>
                <button class="glow-btn" data-difficulty="hard" onclick="setDifficulty('hard')">
                    HARD 8x8
                </button>
            </div>
            <div class="flex justify-center">
                <button class="glow-btn" onclick="restartGame()">
                    RESTART
                </button>
            </div>
            <p class="text-center text-xs text-gray-500 mt-4">
                Press SPACE or ENTER to flip focused card
            </p>
        </footer>
    </div>

    <!-- Win Modal -->
    <div class="modal-overlay" id="winModal">
        <div class="modal-content">
            <h2 class="font-display text-2xl sm:text-4xl font-black mb-4 title-glow">
                VICTORY
            </h2>
            <p class="text-gray-300 mb-6">You conquered the digital dreamscape!</p>
            <div class="flex justify-center gap-8 mb-8">
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Final Time</div>
                    <div class="stat-value text-2xl font-bold" id="finalTime">00:00</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Total Moves</div>
                    <div class="stat-value text-2xl font-bold" id="finalMoves">0</div>
                </div>
            </div>
            <button class="glow-btn" onclick="closeModal(); restartGame();">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <!-- Card Icons SVG -->
    <svg style="display: none;">
        <defs>
            <!-- Bust -->
            <symbol id="icon-bust" viewBox="0 0 100 100">
                <path fill="#FF77FF" d="M50 15c-8 0-15 7-15 15 0 6 3 11 8 13v7c-10 3-20 10-20 20v10h54v-10c0-10-10-17-20-20v-7c5-2 8-7 8-13 0-8-7-15-15-15z"/>
            </symbol>
            <!-- Cassette -->
            <symbol id="icon-cassette" viewBox="0 0 100 100">
                <rect fill="#00FFFF" x="10" y="25" width="80" height="50" rx="5"/>
                <rect fill="#0a0015" x="15" y="30" width="70" height="40" rx="3"/>
                <circle fill="#FF77FF" cx="35" cy="50" r="12"/>
                <circle fill="#FF77FF" cx="65" cy="50" r="12"/>
                <circle fill="#0a0015" cx="35" cy="50" r="5"/>
                <circle fill="#0a0015" cx="65" cy="50" r="5"/>
                <rect fill="#00FFFF" x="40" y="45" width="20" height="10"/>
            </symbol>
            <!-- Palm -->
            <symbol id="icon-palm" viewBox="0 0 100 100">
                <path fill="#FF77FF" d="M50 90V50c0-5 10-25 30-30-15 15-15 25-10 35-10-10-15-5-20 5 5-20 0-30-15-45 5 15 0 30-10 40-5-10-15-15-25-10 15 5 25 20 25 35v40h25z"/>
            </symbol>
            <!-- Sun -->
            <symbol id="icon-sun" viewBox="0 0 100 100">
                <circle fill="#FFD700" cx="50" cy="50" r="20"/>
                <g stroke="#FFD700" stroke-width="3" fill="none">
                    <line x1="50" y1="10" x2="50" y2="20"/>
                    <line x1="50" y1="80" x2="50" y2="90"/>
                    <line x1="10" y1="50" x2="20" y2="50"/>
                    <line x1="80" y1="50" x2="90" y2="50"/>
                    <line x1="22" y1="22" x2="29" y2="29"/>
                    <line x1="71" y1="71" x2="78" y2="78"/>
                    <line x1="22" y1="78" x2="29" y2="71"/>
                    <line x1="71" y1="29" x2="78" y2="22"/>
                </g>
            </symbol>
            <!-- Computer -->
            <symbol id="icon-computer" viewBox="0 0 100 100">
                <rect fill="#00FFFF" x="15" y="20" width="70" height="50" rx="3"/>
                <rect fill="#0a0015" x="20" y="25" width="60" height="40"/>
                <rect fill="#FF77FF" x="35" y="70" width="30" height="5"/>
                <rect fill="#FF77FF" x="25" y="75" width="50" height="5" rx="2"/>
                <text x="30" y="50" fill="#00FFFF" font-family="monospace" font-size="12">AESTHETIC</text>
            </symbol>
            <!-- Diamond -->
            <symbol id="icon-diamond" viewBox="0 0 100 100">
                <polygon fill="#00FFFF" points="50,10 90,40 50,90 10,40"/>
                <polygon fill="#FF77FF" points="50,10 70,40 50,90 30,40" opacity="0.5"/>

            </symbol>
            <!-- Heart -->
            <symbol id="icon-heart" viewBox="0 0 100 100">

            </symbol>
            <!-- Star -->
            <symbol id="icon-star" viewBox="0 0 100 100">
                <polygon fill="#FFD700" points="50,5 61,39 97,39 68,61 79,95 50,73 21,95 32,61 3,39 39,39"/>
            </symbol>
            <!-- Wave -->
            <symbol id="icon-wave" viewBox="0 0 100 100">

                <path fill="none" stroke="#FF77FF" stroke-width="4" stroke-linecap="round" d="M0 65 Q15 45, 30 65 T60 65 T90 65"/>
            </symbol>
            <!-- Pillar -->
            <symbol id="icon-pillar" viewBox="0 0 100 100">
                <rect fill="#BF00FF" x="30" y="10" width="40" height="10"/>
                <rect fill="#FF77FF" x="35" y="20" width="30" height="60"/>
                <rect fill="#BF00FF" x="30" y="80" width="40" height="10"/>
                <line x1="40" y1="20" x2="40" y2="80" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
                <line x1="50" y1="20" x2="50" y2="80" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
                <line x1="60" y1="20" x2="60" y2="80" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
            </symbol>
            <!-- Flower -->
            <symbol id="icon-flower" viewBox="0 0 100 100">
                <circle fill="#FF77FF" cx="50" cy="30" r="15"/>
                <circle fill="#FF77FF" cx="70" cy="50" r="15"/>
                <circle fill="#FF77FF" cx="50" cy="70" r="15"/>
                <circle fill="#FF77FF" cx="30" cy="50" r="15"/>
                <circle fill="#00FFFF" cx="50" cy="50" r="12"/>
            </symbol>
            <!-- Triangle -->
            <symbol id="icon-triangle" viewBox="0 0 100 100">
                <polygon fill="none" stroke="#00FFFF" stroke-width="3" points="50,15 85,80 15,80"/>
                <polygon fill="none" stroke="#FF77FF" stroke-width="2" points="50,30 70,70 30,70"/>
                <circle fill="#FFD700" cx="50" cy="55" r="8"/>
            </symbol>
            <!-- Eye -->
            <symbol id="icon-eye" viewBox="0 0 100 100">
                <ellipse fill="none" stroke="#00FFFF" stroke-width="3" cx="50" cy="50" rx="40" ry="25"/>
                <circle fill="#FF77FF" cx="50" cy="50" r="15"/>
                <circle fill="#0a0015" cx="50" cy="50" r="8"/>
                <circle fill="#ffffff" cx="45" cy="45" r="3"/>
            </symbol>
            <!-- Moon -->
            <symbol id="icon-moon" viewBox="0 0 100 100">
                <path fill="#BF00FF" d="M60 15A35 35 0 1 0 60 85A25 25 0 1 1 60 15"/>
                <circle fill="#FF77FF" cx="30" cy="30" r="2"/>
                <circle fill="#FF77FF" cx="70" cy="25" r="1.5"/>
                <circle fill="#FF77FF" cx="75" cy="70" r="2"/>
                <circle fill="#FF77FF" cx="20" cy="65" r="1"/>
            </symbol>
            <!-- Grid -->
            <symbol id="icon-grid" viewBox="0 0 100 100">
                <rect fill="none" stroke="#FF77FF" stroke-width="2" x="10" y="10" width="35" height="35"/>
                <rect fill="none" stroke="#00FFFF" stroke-width="2" x="55" y="10" width="35" height="35"/>
                <rect fill="none" stroke="#00FFFF" stroke-width="2" x="10" y="55" width="35" height="35"/>
                <rect fill="none" stroke="#FF77FF" stroke-width="2" x="55" y="55" width="35" height="35"/>
            </symbol>
            <!-- Checkered -->
            <symbol id="icon-checkered" viewBox="0 0 100 100">
                <rect fill="#FF77FF" x="10" y="10" width="20" height="20"/>
                <rect fill="#00FFFF" x="30" y="10" width="20" height="20"/>
                <rect fill="#FF77FF" x="50" y="10" width="20" height="20"/>
                <rect fill="#00FFFF" x="70" y="10" width="20" height="20"/>
                <rect fill="#00FFFF" x="10" y="30" width="20" height="20"/>
                <rect fill="#FF77FF" x="30" y="30" width="20" height="20"/>
                <rect fill="#00FFFF" x="50" y="30" width="20" height="20"/>
                <rect fill="#FF77FF" x="70" y="30" width="20" height="20"/>
                <rect fill="#FF77FF" x="10" y="50" width="20" height="20"/>
                <rect fill="#00FFFF" x="30" y="50" width="20" height="20"/>
                <rect fill="#FF77FF" x="50" y="50" width="20" height="20"/>
                <rect fill="#00FFFF" x="70" y="50" width="20" height="20"/>
                <rect fill="#00FFFF" x="10" y="70" width="20" height="20"/>
                <rect fill="#FF77FF" x="30" y="70" width="20" height="20"/>
                <rect fill="#00FFFF" x="50" y="70" width="20" height="20"/>
                <rect fill="#FF77FF" x="70" y="70" width="20" height="20"/>
            </symbol>
            <!-- Cross -->
            <symbol id="icon-cross" viewBox="0 0 100 100">
                <path fill="#FF77FF" d="M40 10h20v30h30v20h-30v30h-20v-30h-30v-20h30z"/>
            </symbol>
            <!-- Disc -->
            <symbol id="icon-disc" viewBox="0 0 100 100">
                <circle fill="#FF77FF" cx="50" cy="50" r="40"/>
                <circle fill="#0a0015" cx="50" cy="50" r="25"/>
                <circle fill="#00FFFF" cx="50" cy="50" r="10"/>
                <circle fill="#0a0015" cx="50" cy="50" r="4"/>
            </symbol>
            <!-- Column -->
            <symbol id="icon-column" viewBox="0 0 100 100">
                <path fill="#00FFFF" d="M25 90h50v5h-50z"/>
                <path fill="#FF77FF" d="M30 15h40v75h-40z"/>
                <path fill="#00FFFF" d="M25 10h50l-5 10h-40z"/>
                <rect fill="#00FFFF" x="35" y="25" width="30" height="3"/>
                <rect fill="#00FFFF" x="35" y="35" width="30" height="3"/>
                <rect fill="#00FFFF" x="35" y="45" width="30" height="3"/>
            </symbol>
            <!-- Helm -->
            <symbol id="icon-helm" viewBox="0 0 100 100">
                <circle fill="none" stroke="#00FFFF" stroke-width="3" cx="50" cy="50" r="35"/>
                <circle fill="#FF77FF" cx="50" cy="50" r="10"/>
                <line x1="50" y1="15" x2="50" y2="40" stroke="#FF77FF" stroke-width="3"/>
                <line x1="50" y1="60" x2="50" y2="85" stroke="#FF77FF" stroke-width="3"/>
                <line x1="15" y1="50" x2="40" y2="50" stroke="#FF77FF" stroke-width="3"/>
                <line x1="60" y1="50" x2="85" y2="50" stroke="#FF77FF" stroke-width="3"/>
                <line x1="25" y1="25" x2="43" y2="43" stroke="#FF77FF" stroke-width="3"/>
                <line x1="57" y1="57" x2="75" y2="75" stroke="#FF77FF" stroke-width="3"/>
                <line x1="75" y1="25" x2="57" y2="43" stroke="#FF77FF" stroke-width="3"/>
                <line x1="43" y1="57" x2="25" y2="75" stroke="#FF77FF" stroke-width="3"/>
            </symbol>
        </defs>
    </svg>

    <script>
        // Icon list for cards
        const cardIcons = [
            'bust', 'cassette', 'palm', 'sun', 'computer', 'diamond',
            'heart', 'star', 'wave', 'pillar', 'flower', 'triangle',
            'eye', 'moon', 'grid', 'checkered', 'cross', 'disc',
            'column', 'helm', 'bust', 'cassette', 'palm', 'sun',
            'computer', 'diamond', 'heart', 'star', 'wave', 'pillar',
            'flower', 'triangle'
        ];

        // Game state - Initialize all variables first
        let difficulty = 'easy';
        let gridSize = 4;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 8;
        let moves = 0;
        let timerInterval = null;
        let seconds = 0;
        let isLocked = false;
        let particles = [];

        // Difficulty settings
        const difficulties = {
            easy: { grid: 4, pairs: 8 },
            medium: { grid: 6, pairs: 18 },
            hard: { grid: 8, pairs: 32 }
        };

        // Particle system
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function createParticles(x, y) {
            const colors = ['#FF77FF', '#00FFFF', '#BF00FF', '#FFD700'];
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 * i) / 30;
                const velocity = 3 + Math.random() * 4;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * velocity,
                    vy: Math.sin(angle) * velocity,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.01,
                    size: Math.max(2, 3 + Math.random() * 4),
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function updateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.beginPath();
                const radius = Math.max(0.5, p.size * p.life);
                ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fill();
                
                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            
            requestAnimationFrame(updateParticles);
        }
        updateParticles();

        // Set difficulty
        function setDifficulty(diff) {
            difficulty = diff;
            gridSize = difficulties[diff].grid;
            totalPairs = difficulties[diff].pairs;
            
            // Update button states
            document.querySelectorAll('[data-difficulty]').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-difficulty="${diff}"]`).classList.add('active');
            
            restartGame();
        }

        // Shuffle array
        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Create game
        function createGame() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            // Calculate card size based on grid
            const maxGridSize = window.innerWidth < 640 ? 95 : 600;
            const cardSize = Math.floor((maxGridSize - (gridSize - 1) * 8) / gridSize);
            grid.style.maxWidth = `${cardSize * gridSize + (gridSize - 1) * 8}px`;
            
            // Create pairs
            const selectedIcons = cardIcons.slice(0, totalPairs);
            const pairedIcons = [...selectedIcons];
            cards = shuffle(pairedIcons);
            
            cards.forEach((icon, index) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                container.style.width = `${cardSize}px`;
                container.style.height = `${cardSize}px`;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.icon = icon;
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', `Card ${index + 1}`);
                
                card.innerHTML = `
                    <div class="card-face card-back">
                        <svg class="card-back-icon"><use href="#icon-diamond"/></svg>
                    </div>
                    <div class="card-face card-front">
                        <svg class="card-icon" style="color: var(--neon-pink)"><use href="#icon-${icon}"/></svg>
                    </div>
                `;
                
                card.addEventListener('click', () => flipCard(card));
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        flipCard(card);
                    }
                });
                
                container.appendChild(card);
                grid.appendChild(container);
            });
            
            // Update stats
            document.getElementById('total').textContent = totalPairs;
            document.getElementById('matched').textContent = '0';
            document.getElementById('moves').textContent = '0';
            matchedPairs = 0;
            moves = 0;
        }

        // Flip card
        function flipCard(card) {
            if (isLocked) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped', 'active');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        // Check for match
        function checkMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.icon === card2.dataset.icon;
            
            if (match) {
                // Success
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    card1.classList.remove('active');
                    card2.classList.remove('active');
                    matchedPairs++;
                    document.getElementById('matched').textContent = matchedPairs;
                    
                    // Create particles at card positions
                    const rect1 = card1.getBoundingClientRect();
                    const rect2 = card2.getBoundingClientRect();
                    createParticles(rect1.left + rect1.width / 2, rect1.top + rect1.height / 2);
                    createParticles(rect2.left + rect2.width / 2, rect2.top + rect2.height / 2);
                    
                    flippedCards = [];
                    isLocked = false;
                    
                    // Check win
                    if (matchedPairs === totalPairs) {
                        setTimeout(showWinModal, 500);
                    }
                }, 400);
            } else {
                // Failure - shake
                setTimeout(() => {
                    card1.classList.add('shake');
                    card2.classList.add('shake');
                    
                    setTimeout(() => {
                        card1.classList.remove('flipped', 'active', 'shake');
                        card2.classList.remove('flipped', 'active', 'shake');
                        flippedCards = [];
                        isLocked = false;
                    }, 600);
                }, 600);
            }
        }

        // Timer
        function startTimer() {
            seconds = 0;
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // Win modal
        function showWinModal() {
            stopTimer();
            document.getElementById('finalTime').textContent = document.getElementById('timer').textContent;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('winModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('winModal').classList.remove('active');
        }

        // Restart game
        function restartGame() {
            stopTimer();
            flippedCards = [];
            isLocked = false;
            createGame();
            startTimer();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setDifficulty('easy');
        });

        // Close modal on click outside
        document.getElementById('winModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('winModal')) {
                closeModal();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
