<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMORY WAVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0612;
            --bg-purple: #1a0a2e;
            --neon-pink: #FF77FF;
            --neon-cyan: #00FFFF;
            --neon-purple: #BF00FF;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }

        /* Animated Background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                #0a0612 0%,
                #1a0a2e 30%,
                #2d1b4e 50%,
                #4a1a6b 70%,
                #1a0a2e 100%
            );
            background-size: 100% 200%;
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 0% 100%; }
        }

        /* Sunset */
        .sunset {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(
                circle at center,
                #FF6B9D 0%,
                #FF77FF 20%,
                #BF00FF 40%,
                transparent 70%
            );
            opacity: 0.6;
            filter: blur(60px);
            animation: sunsetPulse 8s ease-in-out infinite;
        }

        @keyframes sunsetPulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
        }

        /* Neon Grid */
        .grid-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: 
                linear-gradient(90deg, rgba(255,119,255,0.1) 1px, transparent 1px),
                linear-gradient(rgba(0,255,255,0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom center;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 80%);
            animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        /* Noise overlay */
        .noise {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            opacity: 0.6;
            animation: floatParticle 15s linear infinite;
        }

        .particle:nth-child(odd) {
            background: var(--neon-pink);
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Main Container */
        .game-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Header */
        header {
            text-align: center;
            padding: 1.5rem 1rem;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan), var(--neon-pink));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGradient 5s ease infinite;
            text-shadow: none;
        }

        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            letter-spacing: 0.3em;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .stat-value.steps {
            color: var(--neon-pink);
        }

        /* Game Board */
        .board-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .game-board {
            display: grid;
            gap: 0.5rem;
            max-width: 100%;
            padding: 1rem;
            background: var(--glass-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Cards */
        .card {
            --card-size: clamp(50px, 12vw, 80px);
            width: var(--card-size);
            height: var(--card-size);
            perspective: 1000px;
            cursor: pointer;
            outline: none;
        }

        .card:focus-visible {
            outline: 2px solid var(--neon-cyan);
            outline-offset: 3px;
            border-radius: 0.75rem;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
        }

        .card-back {
            background: linear-gradient(135deg, rgba(191, 0, 255, 0.3), rgba(255, 119, 255, 0.2));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card-back::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(255, 119, 255, 0.3);
            border-radius: 0.5rem;
        }

        .card-back::after {
            content: '';
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        .card-front {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transform: rotateY(180deg);
        }

        .card-front svg {
            width: 60%;
            height: 60%;
        }

        .card.flipped:not(.matched) .card-front {
            box-shadow: 
                0 0 20px rgba(255, 119, 255, 0.5),
                0 0 40px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .card.matched {
            pointer-events: none;
        }

        .card.matched .card-front {
            opacity: 0.5;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(191, 0, 255, 0.1));
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .card.shake .card-inner {
            animation: cardShake 0.5s ease-in-out;
        }

        @keyframes cardShake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20% { transform: rotateY(180deg) translateX(-5px); }
            40% { transform: rotateY(180deg) translateX(5px); }
            60% { transform: rotateY(180deg) translateX(-5px); }
            80% { transform: rotateY(180deg) translateX(5px); }
        }

        /* Controls */
        .controls {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .difficulty-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .diff-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 0.75rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .diff-btn:hover {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .diff-btn.active {
            background: linear-gradient(135deg, rgba(255, 119, 255, 0.3), rgba(191, 0, 255, 0.2));
            border-color: var(--neon-pink);
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(255, 119, 255, 0.3);
        }

        .action-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            border: none;
            color: var(--text-primary);
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .action-btn:hover::before {
            opacity: 1;
        }

        .action-btn span {
            position: relative;
            z-index: 1;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 30px rgba(255, 119, 255, 0.4),
                0 0 60px rgba(0, 255, 255, 0.2);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        /* Win Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 6, 18, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(135deg, rgba(26, 10, 46, 0.9), rgba(45, 27, 78, 0.8));
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            max-width: 90%;
            width: 400px;
            transform: scale(0.8) translateY(20px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .modal-stat {
            text-align: center;
        }

        .modal-stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .modal-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            margin-top: 0.25rem;
        }

        /* Match Particles Container */
        .match-particles {
            position: fixed;
            pointer-events: none;
            z-index: 50;
        }

        .match-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: matchParticleBurst 0.8s ease-out forwards;
        }

        @keyframes matchParticleBurst {
            0% { 
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% { 
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .game-board {
                padding: 0.5rem;
                gap: 0.35rem;
            }

            .stats-bar {
                gap: 1rem;
            }

            .stat-value {
                font-size: 1.25rem;
            }

            .controls {
                padding: 1rem;
            }

            .diff-btn {
                padding: 0.5rem 1rem;
                font-size: 0.65rem;
            }

            .action-btn {
                padding: 0.75rem 2rem;
                font-size: 0.75rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="bg-gradient"></div>
        <div class="sunset"></div>
        <div class="grid-floor"></div>
        <div class="noise"></div>
        <div class="particles" id="bgParticles"></div>
    </div>

    <div class="game-container">
        <header>
            <h1 class="title">MEMORY WAVE</h1>
            <p class="subtitle">Match the neon dreams</p>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Time</span>
                <span class="stat-value" id="timer">00:00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Moves</span>
                <span class="stat-value steps" id="moves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Pairs</span>
                <span class="stat-value" id="pairs">0/0</span>
            </div>
        </div>

        <div class="board-container">
            <div class="game-board" id="gameBoard" role="grid" aria-label="Memory game board"></div>
        </div>

        <div class="controls">
            <div class="difficulty-selector" role="group" aria-label="Difficulty selection">
                <button class="diff-btn active" data-size="4" aria-pressed="true">EASY</button>
                <button class="diff-btn" data-size="6" aria-pressed="false">MEDIUM</button>
                <button class="diff-btn" data-size="8" aria-pressed="false">HARD</button>
            </div>
            <button class="action-btn" id="restartBtn" aria-label="Restart game">
                <span>RESTART</span>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="winModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <h2 class="modal-title" id="modalTitle">YOU WIN</h2>
            <p style="color: var(--text-muted);">All pairs matched!</p>
            <div class="modal-stats">
                <div class="modal-stat">
                    <div class="modal-stat-value" id="finalTime">00:00</div>
                    <div class="modal-stat-label">TIME</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-value" id="finalMoves">0</div>
                    <div class="modal-stat-label">MOVES</div>
                </div>
            </div>
            <button class="action-btn" id="playAgainBtn" style="margin-top: 1rem;">
                <span>PLAY AGAIN</span>
            </button>
        </div>
    </div>

    <div class="match-particles" id="matchParticles"></div>

    <script>
        // Vaporwave icons as SVG paths
        const ICONS = [
            // Greek Bust
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">

            // Computer
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="15" y="20" width="70" height="50" rx="3"/>
                <rect x="20" y="25" width="60" height="40" fill="rgba(0,255,255,0.1)"/>

                <path d="M30 30 L40 30 L40 45 L30 45 Z" fill="currentColor" opacity="0.5"/>
            </svg>`,
            // Cherry
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M50 20 Q60 10 55 5 Q50 10 50 20"/>
                <path d="M50 20 Q40 30 35 50"/>
                <path d="M50 20 Q60 30 70 45"/>
                <circle cx="35" cy="65" r="18"/>
                <circle cx="70" cy="60" r="16"/>
                <circle cx="32" cy="60" r="3" fill="currentColor"/>
                <circle cx="67" cy="55" r="3" fill="currentColor"/>
            </svg>`,
            // Dolphin
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 50 Q25 30 50 35 Q75 40 85 50 Q75 45 65 50 Q55 55 50 70 L45 80 L40 70 Q35 60 25 55 Q15 52 15 50"/>
                <circle cx="70" cy="47" r="3" fill="currentColor"/>
                <path d="M50 35 L50 30" stroke-width="3"/>
            </svg>`,
            // Grid
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="20" y="30" width="60" height="50" fill="none"/>
                <line x1="40" y1="30" x2="40" y2="80"/>
                <line x1="60" y1="30" x2="60" y2="80"/>

                <line x1="20" y1="70" x2="80" y2="70"/>
                <path d="M20 30 L50 15 L80 30"/>
            </svg>`,
            // VHS
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="15" y="30" width="70" height="40" rx="5"/>
                <rect x="25" y="40" width="20" height="20"/>
                <rect x="55" y="40" width="20" height="20"/>
                <path d="M32 40 L32 60"/>
                <path d="M38 40 L38 60"/>
                <path d="M62 40 L62 60"/>
                <path d="M68 40 L68 60"/>
                <rect x="35" y="75" width="30" height="5" rx="2"/>
            </svg>`,
            // Sunglasses
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 45 L25 40 L45 45"/>
                <path d="M55 45 L75 40 L90 45"/>
                <rect x="10" y="45" width="35" height="25" rx="5" fill="rgba(255,119,255,0.3)"/>

                <line x1="45" y1="55" x2="55" y2="55"/>
            </svg>`,
            // CD
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="50" cy="50" r="35"/>
                <circle cx="50" cy="50" r="25"/>
                <circle cx="50" cy="50" r="15"/>
                <circle cx="50" cy="50" r="6" fill="currentColor"/>
                <path d="M50 15 Q70 20 75 50" stroke-width="1" opacity="0.5"/>
            </svg>`,
            // Statue Hand
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M40 85 L40 50 L35 35 L35 25 L45 25 L45 40 L50 25 L55 25 L55 40 L60 30 L65 35 L55 50 L55 85"/>
                <path d="M55 45 L65 35 L70 40 L60 55"/>
                <circle cx="70" cy="40" r="5"/>
            </svg>`,
            // Diamond
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M50 15 L85 35 L50 85 L15 35 Z"/>
                <path d="M50 15 L35 35 L50 85"/>
                <path d="M50 15 L65 35 L50 85"/>
                <line x1="15" y1="35" x2="85" y2="35"/>
                <path d="M35 35 L50 50 L65 35" stroke-width="1"/>
            </svg>`,
            // Heart
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M50 85 Q20 60 20 40 Q20 20 35 20 Q50 20 50 35 Q50 20 65 20 Q80 20 80 40 Q80 60 50 85"/>
                <path d="M50 35 Q45 30 40 32" stroke-width="1"/>
            </svg>`,
            // Moon
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M60 20 Q35 30 35 55 Q35 80 60 85 Q40 75 40 55 Q40 35 60 20"/>
                <circle cx="70" cy="30" r="2" fill="currentColor"/>
                <circle cx="80" cy="45" r="1.5" fill="currentColor"/>
                <circle cx="75" cy="65" r="1" fill="currentColor"/>
            </svg>`,
            // Star
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M50 15 L58 40 L85 40 L63 58 L72 85 L50 68 L28 85 L37 58 L15 40 L42 40 Z"/>
            </svg>`,
            // Anchor
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="50" cy="25" r="10"/>
                <line x1="50" y1="35" x2="50" y2="85"/>
                <path d="M20 70 Q35 85 50 85 Q65 85 80 70"/>
                <line x1="30" y1="50" x2="70" y2="50"/>
                <circle cx="50" cy="25" r="4" fill="currentColor"/>
            </svg>`,
            // Wave
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 50 Q25 30 40 50 Q55 70 70 50 Q85 30 95 50"/>
                <path d="M10 60 Q25 40 40 60 Q55 80 70 60 Q85 40 95 60"/>
                <path d="M10 70 Q25 50 40 70 Q55 90 70 70 Q85 50 95 70"/>
            </svg>`,
            // Cloud
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <ellipse cx="35" cy="55" rx="20" ry="15"/>
                <ellipse cx="55" cy="50" rx="25" ry="18"/>
                <ellipse cx="75" cy="55" rx="15" ry="12"/>
                <ellipse cx="50" cy="65" rx="30" ry="12"/>
            </svg>`,
            // Lightning
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M55 15 L35 50 L50 50 L40 85 L70 45 L52 45 L65 15 Z" fill="rgba(0,255,255,0.3)"/>
            </svg>`,
            // Flower
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="50" cy="50" r="12"/>
                <ellipse cx="50" cy="25" rx="10" ry="15"/>
                <ellipse cx="50" cy="75" rx="10" ry="15"/>
                <ellipse cx="25" cy="50" rx="15" ry="10"/>
                <ellipse cx="75" cy="50" rx="15" ry="10"/>
                <ellipse cx="33" cy="33" rx="10" ry="12" transform="rotate(-45 33 33)"/>
                <ellipse cx="67" cy="33" rx="10" ry="12" transform="rotate(45 67 33)"/>
                <ellipse cx="33" cy="67" rx="10" ry="12" transform="rotate(45 33 67)"/>
                <ellipse cx="67" cy="67" rx="10" ry="12" transform="rotate(-45 67 67)"/>
            </svg>`,
            // Pyramid
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M50 15 L85 80 L15 80 Z"/>
                <path d="M50 15 L50 80"/>
                <path d="M50 15 L70 80"/>
                <line x1="15" y1="80" x2="85" y2="80"/>
            </svg>`,
            // Eye
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 50 Q50 20 90 50 Q50 80 10 50"/>
                <circle cx="50" cy="50" r="15"/>
                <circle cx="50" cy="50" r="8" fill="currentColor"/>
                <circle cx="46" cy="46" r="3" fill="rgba(255,255,255,0.5)"/>
            </svg>`,
            // Key
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="30" cy="35" r="18"/>
                <circle cx="30" cy="35" r="8"/>
                <line x1="45" y1="45" x2="85" y2="45"/>
                <line x1="75" y1="45" x2="75" y2="55"/>
                <line x1="65" y1="45" x2="65" y2="60"/>
                <line x1="55" y1="45" x2="55" y2="52"/>
            </svg>`,
            // Crown
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 75 L15 35 L35 55 L50 25 L65 55 L85 35 L85 75 Z"/>
                <circle cx="15" cy="32" r="5"/>
                <circle cx="50" cy="22" r="5"/>
                <circle cx="85" cy="32" r="5"/>
                <line x1="15" y1="75" x2="85" y2="75"/>
            </svg>`,
            // Rocket
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M50 10 Q35 25 35 55 L35 70 L50 80 L65 70 L65 55 Q65 25 50 10"/>
                <circle cx="50" cy="40" r="10"/>
                <circle cx="50" cy="40" r="4" fill="currentColor"/>
                <path d="M35 60 L25 75 L35 70"/>
                <path d="M65 60 L75 75 L65 70"/>
                <path d="M45 80 L45 90 L50 85 L55 90 L55 80"/>
            </svg>`,
            // UFO
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <ellipse cx="50" cy="55" rx="35" ry="12"/>
                <ellipse cx="50" cy="50" rx="20" ry="15"/>
                <path d="M50 35 L50 20"/>
                <circle cx="50" cy="17" r="4"/>
                <ellipse cx="50" cy="65" rx="25" ry="5" stroke-dasharray="4 3"/>
                <circle cx="35" cy="55" r="3" fill="currentColor"/>
                <circle cx="50" cy="55" r="3" fill="currentColor"/>
                <circle cx="65" cy="55" r="3" fill="currentColor"/>
            </svg>`,
            // Planet
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="50" cy="50" r="28"/>
                <ellipse cx="50" cy="50" rx="45" ry="12" transform="rotate(-20 50 50)"/>
                <circle cx="40" cy="40" r="5" fill="rgba(0,255,255,0.2)"/>
                <circle cx="60" cy="55" r="3" fill="rgba(255,119,255,0.2)"/>
            </svg>`,
            // Music Note
            `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <ellipse cx="30" cy="75" rx="12" ry="8"/>
                <ellipse cx="70" cy="65" rx="12" ry="8"/>
                <line x1="42" y1="75" x2="42" y2="25"/>
                <line x1="82" y1="65" x2="82" y2="15"/>
                <path d="M42 25 L82 15 L82 30 L42 40 Z"/>
            </svg>`
        ];

        // Game State
        let gameState = {
            gridSize: 4,
            cards: [],
            flippedCards: [],
            matchedPairs: 0,
            totalPairs: 0,
            moves: 0,
            timer: null,
            seconds: 0,
            isLocked: false,
            gameStarted: false
        };

        // DOM Elements
        const gameBoard = document.getElementById('gameBoard');
        const timerDisplay = document.getElementById('timer');
        const movesDisplay = document.getElementById('moves');
        const pairsDisplay = document.getElementById('pairs');
        const restartBtn = document.getElementById('restartBtn');
        const winModal = document.getElementById('winModal');
        const finalTime = document.getElementById('finalTime');
        const finalMoves = document.getElementById('finalMoves');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const diffBtns = document.querySelectorAll('.diff-btn');
        const matchParticlesContainer = document.getElementById('matchParticles');

        // Initialize background particles
        function initBgParticles() {
            const container = document.getElementById('bgParticles');
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // Shuffle array
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Format time
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Start timer
        function startTimer() {
            if (!gameState.timer) {
                gameState.timer = setInterval(() => {
                    gameState.seconds++;
                    timerDisplay.textContent = formatTime(gameState.seconds);
                }, 1000);
            }
        }

        // Stop timer
        function stopTimer() {
            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }
        }

        // Create match particles
        function createMatchParticles(x, y) {
            const colors = ['#FF77FF', '#00FFFF', '#BF00FF', '#FF6B9D', '#9D4EDD'];
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'match-particle';
                const angle = (Math.PI * 2 * i) / 20;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                particle.style.cssText = `
                    left: ${x}px;
                    top: ${y}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    box-shadow: 0 0 6px currentColor;
                `;
                matchParticlesContainer.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        // Create card element
        function createCard(index, iconIndex) {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('role', 'gridcell');
            card.setAttribute('tabindex', '0');
            card.setAttribute('aria-label', `Card ${index + 1}`);
            card.dataset.index = index;
            card.dataset.iconIndex = iconIndex;

            const color = `hsl(${280 + iconIndex * 10}, 100%, 70%)`;
            
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front" style="color: ${color}">
                        ${ICONS[iconIndex]}
                    </div>
                </div>
            `;

            card.addEventListener('click', () => flipCard(card));
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    flipCard(card);
                }
            });

            return card;
        }

        // Flip card
        function flipCard(card) {
            if (gameState.isLocked) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (gameState.flippedCards.length >= 2) return;

            if (!gameState.gameStarted) {
                gameState.gameStarted = true;
                startTimer();
            }

            card.classList.add('flipped');
            gameState.flippedCards.push(card);

            if (gameState.flippedCards.length === 2) {
                gameState.moves++;
                movesDisplay.textContent = gameState.moves;
                checkMatch();
            }
        }

        // Check for match
        function checkMatch() {
            const [card1, card2] = gameState.flippedCards;
            const match = card1.dataset.iconIndex === card2.dataset.iconIndex;

            gameState.isLocked = true;

            if (match) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    gameState.matchedPairs++;
                    pairsDisplay.textContent = `${gameState.matchedPairs}/${gameState.totalPairs}`;

                    // Create particles at center of the match
                    const rect1 = card1.getBoundingClientRect();
                    const rect2 = card2.getBoundingClientRect();
                    const centerX = (rect1.left + rect1.right + rect2.left + rect2.right) / 4;
                    const centerY = (rect1.top + rect1.bottom + rect2.top + rect2.bottom) / 4;
                    createMatchParticles(centerX, centerY);

                    gameState.flippedCards = [];
                    gameState.isLocked = false;

                    if (gameState.matchedPairs === gameState.totalPairs) {
                        endGame();
                    }
                }, 300);
            } else {
                setTimeout(() => {
                    card1.classList.add('shake');
                    card2.classList.add('shake');

                    setTimeout(() => {
                        card1.classList.remove('flipped', 'shake');
                        card2.classList.remove('flipped', 'shake');
                        gameState.flippedCards = [];
                        gameState.isLocked = false;
                    }, 500);
                }, 800);
            }
        }

        // Initialize game
        function initGame() {
            stopTimer();
            gameState = {
                ...gameState,
                cards: [],
                flippedCards: [],
                matchedPairs: 0,
                totalPairs: (gameState.gridSize * gameState.gridSize) / 2,
                moves: 0,
                seconds: 0,
                isLocked: false,
                gameStarted: false
            };

            timerDisplay.textContent = '00:00';
            movesDisplay.textContent = '0';
            pairsDisplay.textContent = `0/${gameState.totalPairs}`;

            // Generate card pairs
            const numPairs = gameState.totalPairs;
            const selectedIcons = shuffle(ICONS.slice(0, numPairs));
            const cardPairs = [...selectedIcons.keys(), ...selectedIcons.keys()];
            const shuffledCards = shuffle(cardPairs);

            // Set grid
            gameBoard.style.gridTemplateColumns = `repeat(${gameState.gridSize}, 1fr)`;
            gameBoard.innerHTML = '';

            // Create cards with staggered animation
            shuffledCards.forEach((iconIndex, i) => {
                const card = createCard(i, iconIndex);
                card.style.opacity = '0';
                card.style.transform = 'scale(0.8)';
                gameBoard.appendChild(card);

                setTimeout(() => {
                    card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'scale(1)';
                }, i * 30);
            });

            // Hide win modal
            winModal.classList.remove('show');
        }

        // End game
        function endGame() {
            stopTimer();
            finalTime.textContent = formatTime(gameState.seconds);
            finalMoves.textContent = gameState.moves;
            
            setTimeout(() => {
                winModal.classList.add('show');
            }, 500);
        }

        // Event listeners
        diffBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                diffBtns.forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-pressed', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-pressed', 'true');
                gameState.gridSize = parseInt(btn.dataset.size);
                initGame();
            });
        });

        restartBtn.addEventListener('click', initGame);
        playAgainBtn.addEventListener('click', initGame);

        // Close modal on click outside
        winModal.addEventListener('click', (e) => {
            if (e.target === winModal) {
                winModal.classList.remove('show');
            }
        });

        // Keyboard navigation for modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && winModal.classList.contains('show')) {
                winModal.classList.remove('show');
            }
        });

        // Initialize
        initBgParticles();
        initGame();
    </script>
</body>
</html>
