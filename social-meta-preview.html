<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Preview how your website looks when shared on social media. Test Open Graph and Twitter Cards.">
  <meta name="keywords" content="social media preview, open graph tester, twitter card validator, seo tool">
  <meta name="author" content="Devpalettes">
  
  <title>Social Media Preview Tool | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
  </script>
  <script> tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } } </script>
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-share-alt mr-2"></i>SEO Tool
        </span>
        <h1 class="text-4xl font-bold mb-4">Social Media Preview</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">Test how your links appear on Facebook, Twitter, and LinkedIn.</p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Controls -->
        <div class="space-y-4 animate-on-scroll">
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg">Details</h3>
             <div class="space-y-3">
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Page Title</label>
                   <input type="text" id="meta-title" value="My Awesome Website" oninput="updatePreview()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm">
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Description</label>
                   <textarea id="meta-desc" rows="2" oninput="updatePreview()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm">This is a description of the page content.</textarea>
                </div>
                <div>
                   <label class="block text-xs font-semibold text-slate-500 mb-1">Image URL</label>
                   <input type="text" id="meta-img" value="https://source.unsplash.com/random/1200x630" oninput="updatePreview()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm">
                </div>
             </div>
          </div>
        </div>
        
        <!-- Preview -->
        <div class="lg:col-span-2 space-y-6 animate-on-scroll">
          
          <!-- Facebook Card -->
          <div class="glass-card p-0 overflow-hidden">
             <div class="p-4 border-b border-slate-100 dark:border-slate-700 text-xs text-slate-500 flex items-center gap-2">
                <i class="fab fa-facebook text-blue-600"></i> Facebook Preview
             </div>
             <div class="p-4 bg-white dark:bg-slate-800">
                <div id="fb-card" class="border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden">
                   <div id="fb-img" class="h-48 bg-slate-200 bg-cover bg-center"></div>
                   <div class="p-3">
                      <div class="text-xs text-slate-500 uppercase">example.com</div>
                      <div id="fb-title" class="font-bold text-slate-800 truncate">My Awesome Website</div>
                      <div id="fb-desc" class="text-xs text-slate-500 line-clamp-2">This is a description of the page content.</div>
                   </div>
                </div>
             </div>
          </div>
          
          <!-- Twitter Card -->
          <div class="glass-card p-0 overflow-hidden">
             <div class="p-4 border-b border-slate-100 dark:border-slate-700 text-xs text-slate-500 flex items-center gap-2">
                <i class="fab fa-twitter text-sky-500"></i> Twitter Preview
             </div>
             <div class="p-4 bg-white dark:bg-slate-800">
                <div id="tw-card" class="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden grid md:grid-cols-2">
                   <div id="tw-img" class="h-32 bg-slate-200 bg-cover bg-center"></div>
                   <div class="p-3 flex flex-col justify-center">
                      <div class="text-xs text-slate-500 mb-1">Website</div>
                      <div id="tw-title" class="font-bold text-slate-800 text-sm">My Awesome Website</div>
                      <div id="tw-desc" class="text-xs text-slate-500 mt-1 line-clamp-2">This is a description...</div>
                   </div>
                </div>
             </div>
          </div>
          
        </div>
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  <script src="js/main.js"></script>
  <script src="js/enhancements.js"></script>
  
  <script>
    const titleInput = document.getElementById('meta-title');
    const descInput = document.getElementById('meta-desc');
    const imgInput = document.getElementById('meta-img');
    
    window.updatePreview = function() {
       const title = titleInput.value;
       const desc = descInput.value;
       const img = imgInput.value;
       
       document.getElementById('fb-title').textContent = title;
       document.getElementById('fb-desc').textContent = desc;
       document.getElementById('fb-img').style.backgroundImage = `url(${img})`;
       
       document.getElementById('tw-title').textContent = title;
       document.getElementById('tw-desc').textContent = desc;
       document.getElementById('tw-img').style.backgroundImage = `url(${img})`;
    };
    
    updatePreview();
  </script>
</body>
</html>
