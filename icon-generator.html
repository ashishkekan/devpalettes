<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate custom icon buttons with CSS. Create social icons, menu buttons, and animated icon hover effects.">
  <meta name="keywords" content="icon generator, css icon button, font awesome button, social icon generator, button hover effects">
  <meta name="author" content="Devpalettes">
  
  <title>Icon Button Generator - CSS Hover Effects | Devpalettes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('colorpallates-theme') === 'dark' || 
       (!localStorage.getItem('colorpallates-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <style>
    /* Animations for the generator */
    @keyframes bounce-hover {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .anim-bounce:hover { animation: bounce-hover 0.4s ease; }
    
    .anim-glow:hover { 
       box-shadow: 0 0 15px var(--btn-color, #10b981); 
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-[#0c0f14] text-slate-900 dark:text-slate-100">
  
  <div id="navbar-container"></div>
  
  <main class="pt-10 pb-12 min-h-screen relative overflow-hidden">
    <!-- Visualizer Background -->
    <canvas id="hero-visualizer"></canvas>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
    <div class="gradient-blob blob-3"></div>
    <div id="particles-container"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <!-- Header -->
      <div class="text-center mb-10 animate-on-scroll">
        <span class="inline-block px-4 py-1 bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 text-sm font-medium rounded-full mb-4">
          <i class="fas fa-icons mr-2"></i>Component Tool
        </span>
        <h1 class="text-4xl font-bold mb-4">Icon Button Generator</h1>
        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-6">
          Design custom icon buttons with various styles and hover animations.
        </p>
        <div class="spectrum-line max-w-md mx-auto"></div>
      </div>
      
      <div class="grid lg:grid-cols-2 gap-8">
        
        <!-- Left: Controls -->
        <div class="space-y-6 animate-on-scroll">
          
          <!-- Icon Selection -->
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg flex items-center gap-2">
                <i class="fas fa-hand-pointer text-emerald-500"></i>
                Select Icon
             </h3>
             
             <div class="mb-4">
                <label class="block text-sm font-medium mb-2 text-slate-500">Popular Icons</label>
                <div class="flex flex-wrap gap-2">
                   <button onclick="setIcon('fas fa-home')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fas fa-home"></i></button>
                   <button onclick="setIcon('fas fa-user')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fas fa-user"></i></button>
                   <button onclick="setIcon('fas fa-cog')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fas fa-cog"></i></button>
                   <button onclick="setIcon('fas fa-heart')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fas fa-heart"></i></button>
                   <button onclick="setIcon('fas fa-shopping-cart')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fas fa-shopping-cart"></i></button>
                   <button onclick="setIcon('fas fa-search')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fas fa-search"></i></button>
                   <button onclick="setIcon('fab fa-github')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fab fa-github"></i></button>
                   <button onclick="setIcon('fab fa-twitter')" class="p-2 w-10 h-10 rounded bg-slate-100 dark:bg-slate-800 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-colors"><i class="fab fa-twitter"></i></button>
                </div>
             </div>
             
             <div>
                <label class="block text-sm font-medium mb-2 text-slate-500">Custom Icon Class</label>
                <input type="text" id="icon-class" value="fas fa-rocket" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="e.g. fas fa-star">
             </div>
          </div>
          
          <!-- Style & Colors -->
          <div class="glass-card p-6 shimmer-card">
             <h3 class="font-bold mb-4 text-lg flex items-center gap-2">
                <i class="fas fa-palette text-pink-500"></i>
                Appearance
             </h3>
             
             <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                   <label class="block text-xs font-medium mb-1 text-slate-500">Style</label>
                   <select id="btn-style" onchange="updatePreview()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm focus:outline-none">
                      <option value="solid">Solid</option>
                      <option value="gradient">Gradient</option>
                      <option value="ghost">Ghost (Outline)</option>
                      <option value="glass">Glassmorphism</option>
                   </select>
                </div>
                <div>
                   <label class="block text-xs font-medium mb-1 text-slate-500">Size</label>
                   <select id="btn-size" onchange="updatePreview()" class="w-full bg-slate-100 dark:bg-slate-800 rounded px-3 py-2 text-sm focus:outline-none">
                      <option value="sm">Small</option>
                      <option value="md" selected>Medium</option>
                      <option value="lg">Large</option>
                   </select>
                </div>
             </div>
             
             <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                   <label class="block text-xs font-medium mb-1 text-slate-500">Background Color</label>
                   <input type="color" id="color-bg" value="#10b981" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
                <div>
                   <label class="block text-xs font-medium mb-1 text-slate-500">Icon Color</label>
                   <input type="color" id="color-icon" value="#ffffff" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
             </div>
             
             <div>
                <label class="block text-xs font-medium mb-1 text-slate-500">Hover Effect</label>
                <div class="flex gap-2">
                   <button onclick="setEffect('scale')" class="effect-btn active flex-1 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Scale</button>
                   <button onclick="setEffect('rotate')" class="effect-btn flex-1 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Rotate</button>
                   <button onclick="setEffect('bounce')" class="effect-btn flex-1 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Bounce</button>
                   <button onclick="setEffect('glow')" class="effect-btn flex-1 py-2 rounded text-xs font-bold bg-slate-200 dark:bg-slate-700">Glow</button>
                </div>
             </div>
          </div>
          
        </div>
        
        <!-- Right: Preview & Code -->
        <div class="space-y-6 animate-on-scroll">
          
          <!-- Live Preview -->
          <div class="glass-card p-6 shimmer-card min-h-[200px] flex flex-col items-center justify-center">
             <h3 class="text-sm font-semibold text-slate-500 mb-6 uppercase tracking-wider">Live Preview</h3>
             
             <!-- The Generated Button -->
             <button id="preview-btn" class="transition-all duration-300">
                <i id="preview-icon" class="fas fa-rocket"></i>
             </button>
          </div>
          
          <!-- Code Output -->
          <div class="glass-card p-6 shimmer-card">
             <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">Generated Code</h3>
                <button onclick="copyCode()" class="btn-secondary text-xs py-2 px-4">
                   <i class="fas fa-copy mr-1"></i>Copy Code
                </button>
             </div>
             <div class="bg-slate-100 dark:bg-slate-800 rounded-xl p-4 overflow-auto max-h-60">
                <pre id="code-output" class="text-xs font-mono text-slate-600 dark:text-slate-300"></pre>
             </div>
          </div>
          
        </div>
        
      </div>
    </div>
  </main>
  
  <div id="footer-container"></div>
  
  <script src="js/main.js"></script>
  <script src="js/enhancements.js"></script>
  
  <script>
    (function() {
      const iconClassInput = document.getElementById('icon-class');
      const btnStyle = document.getElementById('btn-style');
      const btnSize = document.getElementById('btn-size');
      const colorBg = document.getElementById('color-bg');
      const colorIcon = document.getElementById('color-icon');
      const previewBtn = document.getElementById('preview-btn');
      const previewIcon = document.getElementById('preview-icon');
      const codeOutput = document.getElementById('code-output');
      
      let currentEffect = 'scale';
      
      function getContrastYIQ(hexcolor) {
         hexcolor = hexcolor.replace("#", "");
         var r = parseInt(hexcolor.substr(0, 2), 16);
         var g = parseInt(hexcolor.substr(2, 2), 16);
         var b = parseInt(hexcolor.substr(4, 2), 16);
         var yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
         return (yiq >= 128) ? 'black' : 'white';
      }
      
      window.setIcon = function(cls) {
         iconClassInput.value = cls;
         updatePreview();
      };
      
      window.setEffect = function(eff) {
         currentEffect = eff;
         document.querySelectorAll('.effect-btn').forEach(b => {
            b.classList.remove('active', 'bg-emerald-500', 'text-white');
         });
         event.target.classList.add('active', 'bg-emerald-500', 'text-white');
         updatePreview();
      };
      
      window.updatePreview = function() {
         const icon = iconClassInput.value || "fas fa-circle";
         const style = btnStyle.value;
         const size = btnSize.value;
         const bg = colorBg.value;
         const iconColor = colorIcon.value;
         
         // Update Icon Class
         previewIcon.className = icon;
         
         // Base Styles
         let cssProps = "";
         let sizes = size === 'sm' ? "w-10 h-10 text-sm" : size === 'lg' ? "w-14 h-14 text-xl" : "w-12 h-12 text-base";
         let sizePx = size === 'sm' ? "40px" : size === 'lg' ? "56px" : "48px";
         let fontPx = size === 'sm' ? "14px" : size === 'lg' ? "20px" : "16px";
         
         // Reset classes
         previewBtn.className = `${sizes} rounded-full flex items-center justify-center transition-all duration-300 cursor-pointer`;
         
         // Apply Styles
         let hoverCSS = "";
         
         if (style === 'solid') {
            previewBtn.style.background = bg;
            previewBtn.style.color = iconColor;
            previewBtn.style.border = 'none';
            previewBtn.style.backdropFilter = 'none';
            cssProps = `background-color: ${bg}; color: ${iconColor};`;
         } 
         else if (style === 'gradient') {
            const grad2 = adjustColor(bg, 30);
            previewBtn.style.background = `linear-gradient(135deg, ${bg}, ${grad2})`;
            previewBtn.style.color = iconColor;
            previewBtn.style.border = 'none';
            cssProps = `background: linear-gradient(135deg, ${bg}, ${grad2}); color: ${iconColor};`;
         }
         else if (style === 'ghost') {
            previewBtn.style.background = 'transparent';
            previewBtn.style.color = bg;
            previewBtn.style.border = `2px solid ${bg}`;
            cssProps = `background: transparent; color: ${bg}; border: 2px solid ${bg};`;
         }
         else if (style === 'glass') {
            const isDark = document.documentElement.classList.contains('dark');
            previewBtn.style.background = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.4)';
            previewBtn.style.backdropFilter = 'blur(4px)';
            previewBtn.style.color = bg; // Use primary color for icon to stand out
            previewBtn.style.border = '1px solid rgba(255,255,255,0.2)';
            cssProps = `background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); color: ${bg};`;
         }
         
         // Apply Hover Effect
         previewBtn.classList.remove('anim-bounce', 'anim-glow');
         previewBtn.style.setProperty('--btn-color', bg);
         
         if (currentEffect === 'scale') {
            previewBtn.onmouseover = () => previewBtn.style.transform = 'scale(1.15)';
            previewBtn.onmouseout = () => previewBtn.style.transform = 'scale(1)';
            hoverCSS = `.icon-btn:hover { transform: scale(1.15); }`;
         } 
         else if (currentEffect === 'rotate') {
            previewBtn.onmouseover = () => previewBtn.style.transform = 'rotate(15deg) scale(1.1)';
            previewBtn.onmouseout = () => previewBtn.style.transform = 'rotate(0deg) scale(1)';
            hoverCSS = `.icon-btn:hover { transform: rotate(15deg) scale(1.1); }`;
         }
         else if (currentEffect === 'bounce') {
            previewBtn.classList.add('anim-bounce');
            previewBtn.onmouseover = null;
            previewBtn.onmouseout = null;
            hoverCSS = `.icon-btn:hover { animation: bounce 0.4s ease; }\n@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }`;
         }
         else if (currentEffect === 'glow') {
            previewBtn.classList.add('anim-glow');
            previewBtn.onmouseover = null;
            previewBtn.onmouseout = null;
            hoverCSS = `.icon-btn:hover { box-shadow: 0 0 15px ${bg}; }`;
         }
         
         // Generate Code
         const htmlCode = `<button class="icon-btn"><i class="${icon}"></i></button>`;
         const cssCode = `<style>
.icon-btn {
  width: ${sizePx};
  height: ${sizePx};
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: ${fontPx};
  transition: all 0.3s ease;
  ${cssProps}
}
 ${hoverCSS}
</style>`;
         
         codeOutput.textContent = `<!-- HTML -->\n${htmlCode}\n\n${cssCode}`;
      };
      
      function adjustColor(hex, amount) {
         const num = parseInt(hex.replace("#",""),16);
         const r = Math.min(255, Math.max(0, (num >> 16) + amount));
         const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
         const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
         return "#" + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
      }
      
      window.copyCode = function() {
         const text = codeOutput.textContent;
         navigator.clipboard.writeText(text).then(() => {
             if(window.Devpalettes && window.Devpalettes.Toast) {
               window.Devpalettes.Toast.show('Code Copied!', 'success');
             } else {
               alert('Code Copied!');
             }
         });
      };
      
      // Event Listeners
      [iconClassInput, btnStyle, btnSize, colorBg, colorIcon].forEach(el => {
         el.addEventListener('input', updatePreview);
         el.addEventListener('change', updatePreview);
      });
      
      // Init
      updatePreview();
      
    })();
  </script>
</body>
</html>
